{# 推送管理页 / 推送历史页 共用的 tab 头。
   调用方传入 active='list' 或 active='history' 与 is_admin。 #}
<nav class="pushes-tabs" data-tab-active="{{ active }}" aria-label="推送模块导航">
  <a class="pushes-tab {% if active == 'list' %}is-active{% endif %}"
     href="/pushes/"
     aria-current="{% if active == 'list' %}page{% else %}false{% endif %}">
    推送管理
  </a>
  <a class="pushes-tab {% if active == 'history' %}is-active{% endif %}"
     href="/pushes/history"
     aria-current="{% if active == 'history' %}page{% else %}false{% endif %}">
    推送历史
  </a>
</nav>
