{% extends "layout.html" %}
{% block title %}链接检查{% endblock %}
{% block page_title %}链接检查{% endblock %}
{% block extra_head %}
  <link rel="stylesheet" href="{{ url_for('static', filename='link_check.css') }}">
{% endblock %}
{% block content %}
<div class="lc-shell">
  <section class="lc-panel">
    <div class="lc-panel-head">
      <div>
        <h2>检查商品链接</h2>
        <p>输入 Shopify 小语种商品链接，系统会抓取轮播图和详情图，判断是否已经替换成对应语种。</p>
      </div>
    </div>

    <form id="linkCheckForm" class="lc-form" enctype="multipart/form-data">
      <label class="lc-field">
        <span>检查链接</span>
        <input id="linkUrl" name="link_url" type="url" placeholder="https://example.com/de/products/demo" required>
      </label>

      <label class="lc-field">
        <span>目标语言</span>
        <select id="targetLanguage" name="target_language" required>
          <option value="">请选择语言</option>
        </select>
      </label>

      <label class="lc-field">
        <span>参考图片（可选）</span>
        <input id="referenceImages" name="reference_images" type="file" accept="image/jpeg,image/png,image/webp" multiple>
        <small>如果上传参考图，系统会额外判断网站图片是否和你提供的原图属于同一张图。</small>
      </label>

      <div class="lc-actions">
        <button id="linkCheckSubmit" class="btn btn-primary" type="submit">开始检查</button>
        <div id="linkCheckStatus" class="lc-status-text">等待开始</div>
      </div>
    </form>

    <div id="linkCheckError" class="lc-error" hidden></div>
  </section>

  <section id="linkCheckSummary" class="lc-panel lc-panel--summary">
    <div class="lc-empty">提交链接后，这里会显示抓取进度、页面语种和最终判断。</div>
  </section>

  <section id="linkCheckResults" class="lc-panel">
    <div class="lc-empty">结果区会按图片卡片展示抓取到的轮播图和详情图。</div>
  </section>
</div>
<script src="{{ url_for('static', filename='link_check.js') }}"></script>
{% endblock %}
