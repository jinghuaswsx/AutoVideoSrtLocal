<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{% block title %}AI素材军师报告{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/mobile.css') }}">
  <script>
    (function() {
      var saved = localStorage.getItem('theme');
      if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <style>
    :root {
      --bg-body: #f2f4f8;
      --text-main: #111827;
      --bg-sidebar: linear-gradient(180deg, #1e3a8a 0%, #1e40af 50%, #2563eb 100%);
      --sidebar-text: #fff;
      --sidebar-hover-bg: rgba(255,255,255,0.12);
      --sidebar-active-bg: rgba(255,255,255,0.2);
      --sidebar-border: rgba(255,255,255,0.12);
      --bg-topbar: rgba(255, 255, 255, 0.9);
      --border-main: #e5e7eb;
      --bg-user-badge: #f3f4f6;
      --text-user-badge: #374151;
      --bg-btn-danger: #fee2e2;
      --text-btn-danger: #dc2626;
      --bg-btn-danger-hover: #fecaca;
      --bg-card: #fff;
      --primary-color: #3b82f6;
      --primary-gradient: linear-gradient(135deg, #2563eb, #0ea5e9);
      --btn-ghost-bg: #fff;
      --btn-ghost-text: #374151;
      --btn-ghost-border: #e5e7eb;
      --btn-ghost-hover-border: #3b82f6;
      --btn-ghost-hover-text: #3b82f6;
    }

    [data-theme='dark'] {
      --bg-body: #0a0f1c;
      --text-main: #e2e8f0;
      --bg-sidebar: linear-gradient(180deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      --sidebar-text: #f8fafc;
      --sidebar-hover-bg: rgba(14, 165, 233, 0.15);
      --sidebar-active-bg: rgba(14, 165, 233, 0.25);
      --sidebar-border: rgba(255,255,255,0.05);
      --bg-topbar: rgba(15, 23, 42, 0.8);
      --border-main: #1e293b;
      --bg-user-badge: #1e293b;
      --text-user-badge: #cbd5e1;
      --bg-btn-danger: rgba(239, 68, 68, 0.15);
      --text-btn-danger: #fca5a5;
      --bg-btn-danger-hover: rgba(239, 68, 68, 0.25);
      --bg-card: #0f172a;
      --primary-color: #0ea5e9;
      --primary-gradient: linear-gradient(135deg, #0284c7, #22d3ee);
      --btn-ghost-bg: transparent;
      --btn-ghost-text: #cbd5e1;
      --btn-ghost-border: #334155;
      --btn-ghost-hover-border: #22d3ee;
      --btn-ghost-hover-text: #22d3ee;
    }

    * { box-sizing: border-box; }
    html { background: var(--bg-body); }
    body {
      margin: 0;
      background: var(--bg-body);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    .main-content {
      width: min(1280px, 100%);
      margin: 0 auto;
      padding: 18px;
    }
    @media (max-width: 720px) {
      .main-content { padding: 12px; }
    }
    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
