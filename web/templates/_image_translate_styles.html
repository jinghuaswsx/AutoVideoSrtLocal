<style>
.it-shell { display: grid; gap: 16px; }
.it-shell .card { background: var(--bg-card,#fff); border:1px solid var(--border-main,#e5e7eb);
                  border-radius:12px; padding:20px; }
.it-shell .form-row { margin-bottom:14px; }
.it-shell .form-row label { display:block; font-size:13px; color:var(--text-main,#111827);
                             opacity:.8; margin-bottom:6px; }
.it-shell .it-product-name-row { margin-bottom: 24px; }
.it-shell .it-product-name-row label { margin-bottom: 10px; font-size: 15px; font-weight: 700; opacity: 1; }
.it-product-name-callout {
  margin: 0 0 12px;
  color: var(--danger, #dc2626);
  font-size: 30px;
  font-weight: 800;
  line-height: 1.2;
  letter-spacing: .01em;
}
.it-product-name-input {
  width: 100%;
  min-height: 108px;
  padding: 20px 22px;
  border: 2px solid rgba(220, 38, 38, 0.45);
  border-radius: 12px;
  background: linear-gradient(180deg, rgba(254, 242, 242, 0.92) 0%, #fff 100%);
  color: var(--text-main,#111827);
  font-size: 30px;
  font-weight: 700;
  line-height: 1.2;
  transition: border-color 120ms, box-shadow 120ms, background-color 120ms;
}
.it-product-name-input::placeholder { color: #9b1c1c; opacity: .52; }
.it-product-name-input:hover { border-color: rgba(220, 38, 38, 0.62); }
.it-product-name-input:focus,
.it-product-name-input:focus-visible {
  outline: none;
  border-color: var(--danger, #dc2626);
  box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.16);
  background: #fff;
}
.it-shell .required { color:#dc2626; }
.it-pill-group { display:flex; flex-wrap:wrap; gap:8px; }
.it-pill { appearance:none; border:1.5px solid var(--border-main,#e5e7eb); background:#fff;
           color:var(--text-main,#111827); border-radius:999px; padding:8px 18px;
           font-size:13px; font-weight:500; cursor:pointer; outline:none;
           transition: border-color 120ms, background-color 120ms, color 120ms, box-shadow 120ms; }
.it-pill:hover { border-color:#9ca3af; background:#f8fbff; }
.it-pill.is-active { border-color:var(--primary-color,#3b82f6);
                     background:linear-gradient(180deg, #1d6fe8 0%, #175bc6 100%);
                     color:#fff; box-shadow:0 4px 10px rgba(29,111,232,.18); }
.it-pill.is-active:hover { background:linear-gradient(180deg, #1d6fe8 0%, #175bc6 100%); }
.it-pill:focus-visible { box-shadow:0 0 0 3px rgba(59,130,246,.22); }
.it-mode-pill { display:inline-flex; align-items:center; justify-content:center;
                padding:5px 12px; font-size:12px; line-height:1.2;
                white-space:nowrap; cursor:default; pointer-events:none; }
.it-thumbs { display:grid; grid-template-columns:repeat(auto-fill,minmax(96px,1fr));
             gap:8px; margin-top:8px; }
.it-thumb { position:relative; border:1px solid var(--border-main,#e5e7eb); border-radius:8px;
            overflow:hidden; aspect-ratio:1/1; }
.it-thumb img { width:100%; height:100%; object-fit:cover; }
.it-thumb .it-thumb-remove { position:absolute; top:4px; right:4px; background:rgba(0,0,0,0.6);
                              color:#fff; border:0; border-radius:50%; width:22px; height:22px;
                              cursor:pointer; line-height:22px; padding:0; }
.it-progress { display:grid; gap:8px; }
.it-progress-bar { height:8px; background:#e5e7eb; border-radius:99px; overflow:hidden; }
#itProgressFill { height:100%; background:linear-gradient(90deg,#1d6fe8,#0ea5e9);
                   width:0%; transition: width 200ms ease; }
.it-items { display:grid; gap:12px; }
.it-item { display:grid; grid-template-columns: 1fr 1fr auto; align-items:center; gap:12px;
           padding:12px; border:1px solid var(--border-main,#e5e7eb); border-radius:10px; }
.it-item img { max-width:100%; max-height:240px; object-fit:contain; border-radius:6px;
               background:#f8fafc; }
.it-item-pane { display:grid; gap:8px; align-content:start; min-width:0; }
.it-item-caption { color:var(--fg-muted,#64748b); font-size:12px; font-weight:600; }
.it-item-meta { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
.it-meta-chip { display:inline-flex; align-items:center; min-height:22px; padding:2px 8px;
                border-radius:999px; border:1px solid transparent; font-size:12px; line-height:1.35; }
.it-meta-chip--detect.is-pending,
.it-meta-chip--source.is-pending { background:var(--bg-muted,#eef2f7); color:var(--fg-muted,#64748b); border-color:var(--border,#dbe3ee); }
.it-meta-chip--detect.is-running { background:var(--info-bg,#e6f2ff); color:var(--info,#0b4fb0); border-color:#bcd8ff; }
.it-meta-chip--detect.is-yes,
.it-meta-chip--source.is-translate { background:var(--accent-subtle,#e6f2ff); color:var(--accent-active,#175bc6); border-color:#bcd8ff; }
.it-meta-chip--detect.is-no,
.it-meta-chip--source.is-copy { background:var(--success-bg,#ecfdf5); color:var(--success-fg,#047857); border-color:#bbf7d0; }
.it-meta-chip--detect.is-warning { background:var(--warning-bg,#fef3c7); color:var(--warning-fg,#92400e); border-color:#fde68a; }
.it-item .it-item-status { font-size:12px; color:#6b7280; }
.it-item .it-item-actions { display:flex; gap:8px; align-items:center; }
.it-meta-grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(180px,1fr)); gap:12px; }
.it-meta-grid > div { padding:10px 12px; border:1px solid var(--border-main,#e5e7eb); border-radius:8px; background:#f8fbff; }
.it-meta-grid label { display:block; font-size:12px; color:var(--text-main,#111827); opacity:.7; }
.inline-error { margin-top:12px; padding:10px 12px; border-radius:8px;
                background:rgba(220,82,60,.08); color:#a94231; }
.empty { padding:24px; text-align:center; color:#6b7280; }
.it-banner { display:flex; flex-direction:column; gap:4px;
             padding:12px 16px; border-radius:8px; border:1px solid transparent;
             line-height:1.5; font-size:13px; }
.it-banner strong { font-size:14px; }
.it-banner--warning { background:#fef3c7; color:#92400e; border-color:#fde68a; }
.chip { display:inline-block; padding:2px 8px; border-radius:999px;
        background:#eef6ff; color:#1d4ed8; font-size:12px; }
.chip--status.is-queued      { background:#eef6ff; color:#1d4ed8; }
.chip--status.is-running     { background:#e6f2ff; color:#0b4fb0; }
.chip--status.is-done        { background:#ecfdf5; color:#047857; }
.chip--status.is-error       { background:#fef2f2; color:#b91c1c; }
.chip--status.is-interrupted { background:#fef3c7; color:#92400e; border:1px solid #fde68a; }
.chip--backend { padding:3px 10px; font-weight:500; letter-spacing:.01em; }
.chip--backend.is-cloud      { background:#e6f2ff; color:#0b4fb0; border:1px solid #bcd8ff; }
.chip--backend.is-aistudio   { background:#e6fbff; color:#0b6b8a; border:1px solid #bfeaf3; }
.chip--backend.is-openrouter { background:#eef2ff; color:#3730a3; border:1px solid #c7d2fe; }
.it-backend-hint { display:flex; align-items:center; gap:8px; margin:-6px 0 14px;
                   font-size:12px; color:var(--fg-muted,#64748b); }
.it-backend-hint .chip--backend { font-size:12px; }
.table { width:100%; border-collapse:collapse; }
.table th, .table td { padding:10px 12px; border-bottom:1px solid var(--border-main,#e5e7eb); text-align:left; font-size:14px; }
.table tbody tr:hover { background:#f8fbff; }
@media (max-width: 767px) {
  .it-item { grid-template-columns: 1fr; align-items:stretch; }
  .it-item .it-item-actions { justify-content:flex-start; }
  .it-product-name-callout { font-size: 24px; }
  .it-product-name-input {
    min-height: 88px;
    padding: 16px 18px;
    font-size: 24px;
  }
}

/* 主进度按钮：「重试未完成的图片」——视觉放大 2×，海洋蓝主色 */
.it-retry-main {
  height: 40px;
  padding: 8px 20px;
  font-size: 15px;
  font-weight: 600;
  border-radius: 8px;
  letter-spacing: .01em;
}
.it-retry-main:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* 列表页「重新生成」按钮：仅在中断行显示，尺寸紧凑 */
.it-list-retry {
  min-width: 88px;
  height: 30px;
  padding: 0 12px;
  font-size: 13px;
  font-weight: 600;
  border: 1px solid var(--primary-color, #1d6fe8);
  background: var(--primary-color, #1d6fe8);
  color: #fff;
  border-radius: 6px;
  cursor: pointer;
  transition: background-color 120ms, box-shadow 120ms, opacity 120ms;
}
.it-list-retry:hover:not(:disabled) { background:#175bc6; }
.it-list-retry:disabled { opacity:0.55; cursor:not-allowed; }

/* 单图重试按钮：紧凑的次级按钮 */
.it-retry-item {
  min-width: 64px;
  height: 32px;
  padding: 0 12px;
  font-size: 13px;
  border: 1.5px solid var(--primary-color, #1d6fe8);
  background: #fff;
  color: var(--primary-color, #1d6fe8);
  border-radius: 6px;
  cursor: pointer;
  transition: background-color 120ms, color 120ms, box-shadow 120ms;
}
.it-retry-item:hover:not(:disabled) {
  background: #f0f6ff;
}
.it-retry-item:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  border-color: #d1d5db;
  color: #9ca3af;
}
</style>
