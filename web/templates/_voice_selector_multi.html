<div id="voice-selector-multi" class="voice-selector"
     data-task-id="{{ task_id }}" data-lang="{{ voice_language }}">
  <div class="vs-heading">
    <strong>🎤 选择 TTS 音色</strong>
    <span class="vs-hint" id="vs-summary">正在加载音色库...</span>
  </div>

  <div class="vs-sample" id="vs-sample" style="display:none;">
    <span style="font-size:13px;color:var(--text-user-badge);">原视频采样：</span>
    <audio controls id="vs-sample-audio" style="height:32px;"></audio>
  </div>

  <div class="vs-warning" id="vs-warning" style="display:none;">
    ⚠️ 原声与库内音色差异较大，建议手动挑选
  </div>

  <div class="vs-toolbar">
    <input id="vs-search" type="text" placeholder="搜索音色名或描述..."/>
    <select id="vs-gender-filter">
      <option value="">全部性别</option>
      <option value="male">男声</option>
      <option value="female">女声</option>
    </select>
    <label style="font-size:12px;color:var(--text-user-badge);margin-left:auto;">
      <input type="checkbox" id="vs-recommended-only"/> 只看推荐
    </label>
  </div>

  <div class="vs-list-scroll" id="vs-list">
    <div class="vs-loading">加载中...</div>
  </div>

  <details class="vs-subtitle-config" open>
    <summary><strong>🎬 字幕样式</strong> <span style="color:var(--text-user-badge);font-weight:normal;font-size:12px;">（可选，默认值够用）</span></summary>
    <div class="vs-sub-grid">
      <label>
        字体
        <select id="vs-sub-font">
          <option value="Impact">Impact</option>
          <option value="Anton">Anton</option>
          <option value="BebasNeue">BebasNeue</option>
          <option value="Montserrat">Montserrat</option>
          <option value="Oswald">Oswald</option>
          <option value="Poppins">Poppins</option>
        </select>
      </label>
      <label>
        大小
        <input id="vs-sub-size" type="number" min="10" max="32" value="14"/>
      </label>
      <label>
        垂直位置 (0=顶部, 1=底部)
        <input id="vs-sub-position-y" type="number" min="0" max="1" step="0.01" value="0.68"/>
      </label>
    </div>
  </details>

  <div class="vs-footer">
    <span id="vs-selection-text">请从列表里选音色，或点"使用默认音色"</span>
    <button type="button" id="vs-launch-btn" class="vs-launch-btn" disabled>
      开始处理
    </button>
  </div>
</div>

<style>
  .voice-selector { margin: 16px 0; padding: 16px;
    background: var(--bg-card); border: 1px solid var(--border-main);
    border-radius: 12px; }
  .vs-heading { display: flex; align-items: baseline; gap: 12px; margin-bottom: 12px; }
  .vs-hint { font-size: 12px; color: var(--text-user-badge); }
  .vs-sample { display: flex; align-items: center; gap: 8px; margin: 8px 0 12px; }
  .vs-warning { padding: 8px 12px; background: oklch(96% 0.05 85);
    border-left: 3px solid oklch(72% 0.14 80); border-radius: 6px;
    margin-bottom: 12px; font-size: 13px; }

  .vs-toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
  .vs-toolbar input[type=text], .vs-toolbar select {
    padding: 6px 10px; border: 1px solid var(--border-main);
    border-radius: 6px; font-size: 13px; font-family: inherit;
  }
  .vs-toolbar input[type=text] { flex: 1; min-width: 160px; }

  .vs-default-btn {
    padding: 6px 14px; border: 1px solid var(--border-main);
    background: var(--bg-card); border-radius: 6px; cursor: pointer;
    font-size: 12px; font-family: inherit; white-space: nowrap;
  }
  .vs-default-btn:hover { border-color: oklch(56% 0.16 230); }

  .vs-list-scroll {
    max-height: 420px; overflow-y: auto; padding: 4px;
    border: 1px solid var(--border-main); border-radius: 8px;
    background: var(--bg-body);
  }
  .vs-loading { padding: 24px; text-align: center; color: var(--text-user-badge); }

  .vs-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; border-radius: 8px; cursor: pointer;
    background: var(--bg-card); margin-bottom: 4px;
    border: 1.5px solid transparent; transition: all 0.12s;
  }
  .vs-row:hover { border-color: oklch(56% 0.16 230); }
  .vs-row.selected { border-color: oklch(56% 0.16 230); background: oklch(94% 0.04 225); }
  .vs-row.recommended { background: linear-gradient(90deg, oklch(95% 0.04 225) 0%, var(--bg-card) 50%); }
  .vs-row.pinned-default {
    background: linear-gradient(90deg, oklch(94% 0.015 230) 0%, var(--bg-card) 60%);
    border-color: oklch(84% 0.015 230);
  }

  .vs-waiting-banner {
    padding: 10px 12px; margin-bottom: 8px;
    background: oklch(96% 0.03 230); border-left: 3px solid oklch(56% 0.16 230);
    border-radius: 6px; font-size: 13px;
  }
  .vs-waiting-banner small { display: block; margin-top: 2px; }

  .vs-row-main { flex: 1; min-width: 0; }
  .vs-row-name { font-weight: 600; font-size: 14px; }
  .vs-row-meta { font-size: 12px; color: var(--text-user-badge); margin-top: 2px; }
  .vs-row-sim {
    display: inline-block; padding: 2px 8px; border-radius: 999px;
    font-size: 11px; font-weight: 600; background: oklch(56% 0.16 230); color: #fff;
    margin-right: 6px;
  }
  .vs-row audio { height: 32px; max-width: 220px; }
  .vs-row-select-btn {
    padding: 6px 14px; border: 1px solid var(--border-main);
    background: var(--bg-card); border-radius: 6px; cursor: pointer;
    font-size: 12px; font-family: inherit; white-space: nowrap;
  }
  .vs-row.selected .vs-row-select-btn {
    background: oklch(56% 0.16 230); color: #fff; border-color: oklch(56% 0.16 230);
  }

  .vs-row-default-btn {
    padding: 6px 10px; border: 1px dashed var(--border-strong, #cbd5e1);
    background: transparent; color: var(--text-user-badge); border-radius: 6px;
    cursor: pointer; font-size: 12px; font-family: inherit; white-space: nowrap;
  }
  .vs-row-default-btn:hover { color: oklch(56% 0.16 230); border-color: oklch(56% 0.16 230); }
  .vs-row-default-btn.is-current {
    border-style: solid; background: #4b5563; color: #fff;
    cursor: default; border-color: #4b5563;
  }

  .vs-subtitle-config {
    margin-top: 16px; padding: 12px 14px;
    background: var(--bg-body); border: 1px solid var(--border-main);
    border-radius: 8px; font-size: 13px;
  }
  .vs-subtitle-config summary { cursor: pointer; user-select: none; }
  .vs-sub-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px; margin-top: 10px;
  }
  .vs-sub-grid label { display: flex; flex-direction: column; gap: 4px; font-size: 12px; }
  .vs-sub-grid select, .vs-sub-grid input {
    padding: 6px 8px; border: 1px solid var(--border-main);
    border-radius: 6px; font-family: inherit; font-size: 13px;
  }

  .vs-footer {
    margin-top: 16px; display: flex; align-items: center; gap: 12px;
    padding-top: 12px; border-top: 1px solid var(--border-main);
  }
  #vs-selection-text { flex: 1; font-size: 13px; color: var(--text-user-badge); }
  .vs-launch-btn {
    padding: 10px 24px; background: oklch(56% 0.16 230); color: #fff;
    border: none; border-radius: 8px; cursor: pointer; font-weight: 600;
    font-family: inherit; font-size: 14px;
  }
  .vs-launch-btn:disabled {
    background: var(--bg-user-badge); color: var(--text-user-badge);
    cursor: not-allowed;
  }
  .vs-launch-btn:not(:disabled):hover { background: oklch(50% 0.17 230); }
</style>
