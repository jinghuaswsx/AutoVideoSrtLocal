<div id="voice-selector-multi" class="voice-selector"
     data-task-id="{{ task_id }}" data-lang="{{ voice_language }}">
  <div class="vs-heading">
    <strong>🎤 选择 TTS 音色</strong>
    <span class="vs-hint" id="vs-summary">正在加载音色库...</span>
  </div>

  <div class="vs-sample" id="vs-sample" style="display:none;">
    <span style="font-size:13px;color:var(--text-user-badge);">原视频采样：</span>
    <audio controls id="vs-sample-audio" style="height:32px;"></audio>
  </div>

  <div class="vs-warning" id="vs-warning" style="display:none;">
    ⚠️ 原声与库内音色差异较大，建议手动挑选
  </div>

  <div class="vs-toolbar">
    <input id="vs-search" type="text" placeholder="搜索音色名或描述..."/>
    <div class="vs-gender-pills" id="vs-gender-filter" role="group" aria-label="性别筛选">
      <button type="button" class="vs-pill vs-pill-male" data-gender="male"
              aria-pressed="false">男声</button>
      <button type="button" class="vs-pill vs-pill-female" data-gender="female"
              aria-pressed="false">女声</button>
    </div>
    <span id="vs-rematching" class="vs-rematching" style="display:none;">重新匹配中…</span>
    <label style="font-size:12px;color:var(--text-user-badge);margin-left:auto;">
      <input type="checkbox" id="vs-recommended-only"/> 只看推荐
    </label>
  </div>

  <div class="vs-list-scroll" id="vs-list">
    <div class="vs-loading">加载中...</div>
  </div>

  <details class="vs-subtitle-config" open>
    <summary><strong>🎬 字幕样式</strong> <span style="color:var(--text-user-badge);font-weight:normal;font-size:12px;">（可选，默认值够用）</span></summary>

    <!-- 字体：下拉 + 预览 -->
    <div class="vs-sub-row">
      <div class="vs-sub-row-label">字体</div>
      <div class="vs-sub-row-body">
        <select id="vs-sub-font">
          <option value="Impact" data-weight="900">Impact</option>
          <option value="Oswald Bold" data-weight="700">Oswald Bold</option>
          <option value="Bebas Neue" data-weight="900">Bebas Neue</option>
          <option value="Montserrat ExtraBold" data-weight="800">Montserrat ExtraBold</option>
          <option value="Poppins Bold" data-weight="700">Poppins Bold</option>
          <option value="Anton" data-weight="900">Anton</option>
        </select>
        <span id="vs-sub-font-preview">TikTok And Facebook</span>
      </div>
    </div>

    <!-- 字号：按钮行 -->
    <div class="vs-sub-row">
      <div class="vs-sub-row-label">字号</div>
      <div class="vs-sub-row-body">
        <div class="vs-size-group" id="vs-size-group">
          <button type="button" data-size="8">8</button>
          <button type="button" data-size="10">10</button>
          <button type="button" data-size="12">12</button>
          <button type="button" data-size="14" class="active">14</button>
          <button type="button" data-size="16">16</button>
          <button type="button" data-size="18">18</button>
          <button type="button" data-size="20">20</button>
          <button type="button" data-size="22">22</button>
          <button type="button" data-size="24">24</button>
          <button type="button" data-size="28">28</button>
        </div>
      </div>
    </div>

    <!-- 位置：滑块 + 百分比 -->
    <div class="vs-sub-row">
      <div class="vs-sub-row-label">位置</div>
      <div class="vs-sub-row-body">
        <input id="vs-sub-position-y" type="range" min="0" max="1" step="0.01" value="0.68"/>
        <span id="vs-sub-pos-hint">68%</span>
        <span style="color:var(--text-user-badge);font-size:11px;">（0=顶部 · 1=底部）</span>
      </div>
    </div>
  </details>

  <div class="vs-footer">
    <span id="vs-selection-text">请从列表里选音色，或点"使用默认音色"</span>
    <button type="button" id="vs-launch-btn" class="vs-launch-btn" disabled>
      开始处理
    </button>
  </div>
</div>

<style>
  .voice-selector { margin: 16px 0; padding: 16px;
    background: var(--bg-card); border: 1px solid var(--border-main);
    border-radius: 12px; }
  .vs-heading { display: flex; align-items: baseline; gap: 12px; margin-bottom: 12px; }
  .vs-hint { font-size: 12px; color: var(--text-user-badge); }
  .vs-sample { display: flex; align-items: center; gap: 8px; margin: 8px 0 12px; }
  .vs-warning { padding: 8px 12px; background: oklch(96% 0.05 85);
    border-left: 3px solid oklch(72% 0.14 80); border-radius: 6px;
    margin-bottom: 12px; font-size: 13px; }

  .vs-toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
  .vs-toolbar input[type=text], .vs-toolbar select {
    padding: 6px 10px; border: 1px solid var(--border-main);
    border-radius: 6px; font-size: 13px; font-family: inherit;
  }
  .vs-toolbar input[type=text] { flex: 1; min-width: 160px; }

  /* 性别胶囊按钮组 */
  .vs-gender-pills { display: flex; gap: 6px; }
  .vs-pill {
    padding: 6px 14px; border: 1.5px solid var(--border-main);
    background: var(--bg-card); border-radius: 999px; cursor: pointer;
    font-size: 13px; font-family: inherit; font-weight: 500;
    color: var(--text-main); transition: background 0.15s, color 0.15s, border-color 0.15s;
    user-select: none;
  }
  .vs-pill:hover { border-color: currentColor; }
  .vs-pill-male.active {
    background: oklch(56% 0.16 230); color: #fff;
    border-color: oklch(56% 0.16 230);
  }
  .vs-pill-female.active {
    background: oklch(58% 0.18 25); color: #fff;
    border-color: oklch(58% 0.18 25);
  }
  .vs-pill:disabled { opacity: 0.4; cursor: wait; }
  .vs-rematching {
    font-size: 12px; color: oklch(56% 0.16 230);
    display: inline-flex; align-items: center; gap: 4px;
  }

  .vs-default-btn {
    padding: 6px 14px; border: 1px solid var(--border-main);
    background: var(--bg-card); border-radius: 6px; cursor: pointer;
    font-size: 12px; font-family: inherit; white-space: nowrap;
  }
  .vs-default-btn:hover { border-color: oklch(56% 0.16 230); }

  .vs-list-scroll {
    max-height: 420px; overflow-y: auto; padding: 4px;
    border: 1px solid var(--border-main); border-radius: 8px;
    background: var(--bg-body);
  }
  .vs-loading { padding: 24px; text-align: center; color: var(--text-user-badge); }

  .vs-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; border-radius: 8px; cursor: pointer;
    background: var(--bg-card); margin-bottom: 4px;
    border: 1.5px solid transparent; transition: all 0.12s;
  }
  .vs-row:hover { border-color: oklch(56% 0.16 230); }
  .vs-row.selected { border-color: oklch(56% 0.16 230); background: oklch(94% 0.04 225); }
  .vs-row.recommended { background: linear-gradient(90deg, oklch(95% 0.04 225) 0%, var(--bg-card) 50%); }
  .vs-row.pinned-default {
    background: linear-gradient(90deg, oklch(94% 0.015 230) 0%, var(--bg-card) 60%);
    border-color: oklch(84% 0.015 230);
  }

  .vs-waiting-banner {
    padding: 10px 12px; margin-bottom: 8px;
    background: oklch(96% 0.03 230); border-left: 3px solid oklch(56% 0.16 230);
    border-radius: 6px; font-size: 13px;
  }
  .vs-waiting-banner small { display: block; margin-top: 2px; }

  .vs-row-main { flex: 1; min-width: 0; }
  .vs-row-name { font-weight: 600; font-size: 14px; }
  .vs-row-meta { font-size: 12px; color: var(--text-user-badge); margin-top: 2px; }
  .vs-row-sim {
    display: inline-block; padding: 2px 8px; border-radius: 999px;
    font-size: 11px; font-weight: 600; background: oklch(56% 0.16 230); color: #fff;
    margin-right: 6px;
  }
  .vs-row audio { height: 32px; max-width: 220px; }
  .vs-row-select-btn {
    padding: 6px 14px; border: 1px solid var(--border-main);
    background: var(--bg-card); border-radius: 6px; cursor: pointer;
    font-size: 12px; font-family: inherit; white-space: nowrap;
  }
  .vs-row.selected .vs-row-select-btn {
    background: oklch(56% 0.16 230); color: #fff; border-color: oklch(56% 0.16 230);
  }

  .vs-row-default-btn {
    padding: 6px 10px; border: 1px dashed var(--border-strong, #cbd5e1);
    background: transparent; color: var(--text-user-badge); border-radius: 6px;
    cursor: pointer; font-size: 12px; font-family: inherit; white-space: nowrap;
  }
  .vs-row-default-btn:hover { color: oklch(56% 0.16 230); border-color: oklch(56% 0.16 230); }
  .vs-row-default-btn.is-current {
    border-style: solid; background: #4b5563; color: #fff;
    cursor: default; border-color: #4b5563;
  }

  .vs-subtitle-config {
    margin-top: 16px; padding: 14px 16px;
    background: var(--bg-body); border: 1px solid var(--border-main);
    border-radius: 8px; font-size: 13px;
  }
  .vs-subtitle-config summary { cursor: pointer; user-select: none; }

  .vs-sub-row {
    display: flex; align-items: center; gap: 16px;
    padding: 10px 0; border-bottom: 1px dashed var(--border-main);
  }
  .vs-sub-row:last-child { border-bottom: none; }
  .vs-sub-row-label {
    flex: 0 0 80px; font-weight: 600; font-size: 13px; color: var(--text-main);
  }
  .vs-sub-row-body {
    flex: 1; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }

  /* 字体 */
  #vs-sub-font {
    padding: 6px 10px; border: 1px solid var(--border-main);
    border-radius: 6px; font-family: inherit; font-size: 13px; min-width: 160px;
  }
  #vs-sub-font-preview {
    font-size: 18px; letter-spacing: .01em;
    color: var(--text-main); padding: 4px 12px;
    background: var(--bg-card); border-radius: 6px;
  }

  /* 字号 */
  .vs-size-group { display: flex; gap: 4px; flex-wrap: wrap; }
  .vs-size-group button {
    padding: 4px 10px; border: 1px solid var(--border-main);
    background: var(--bg-card); border-radius: 6px; cursor: pointer;
    font-family: inherit; font-size: 12px; min-width: 36px;
  }
  .vs-size-group button:hover { border-color: oklch(56% 0.16 230); }
  .vs-size-group button.active {
    background: oklch(56% 0.16 230); color: #fff;
    border-color: oklch(56% 0.16 230); font-weight: 600;
  }

  /* 位置 */
  #vs-sub-position-y { flex: 1; min-width: 200px; }
  #vs-sub-pos-hint {
    font-weight: 600; min-width: 44px; text-align: right; color: var(--text-main);
  }

  .vs-footer {
    margin-top: 16px; padding-top: 16px;
    border-top: 1px solid var(--border-main);
    display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  #vs-selection-text {
    width: 100%; text-align: center;
    font-size: 13px; color: var(--text-user-badge);
  }
  .vs-launch-btn {
    /* 关键主按钮：30% 宽、胶囊形、比原来高 1.5 倍、居中、醒目 */
    width: 30%; min-width: 200px;
    padding: 16px 24px; font-size: 16px; font-weight: 700;
    background: oklch(56% 0.16 230); color: #fff;
    border: none; border-radius: 9999px;
    cursor: pointer; font-family: inherit;
    box-shadow: 0 4px 12px oklch(56% 0.16 230 / 0.35);
    transition: all 0.15s ease;
  }
  .vs-launch-btn:disabled {
    background: var(--bg-user-badge); color: var(--text-user-badge);
    cursor: not-allowed; box-shadow: none;
  }
  .vs-launch-btn:not(:disabled):hover {
    background: oklch(50% 0.17 230);
    box-shadow: 0 6px 16px oklch(56% 0.16 230 / 0.5);
    transform: translateY(-1px);
  }
</style>
