<div class="oc-modal-mask oc" id="edMask" hidden>
  <div class="oc-modal oc-modal-wide" role="dialog" aria-modal="true" aria-labelledby="edTitle">
    <div class="oc-modal-head">
      <h3 id="edTitle">编辑产品素材</h3>
      <button class="oc-icon-btn" id="edClose" title="关闭" aria-label="关闭">
        <svg width="16" height="16"><use href="#ic-close"/></svg>
      </button>
    </div>

    <div class="oc-modal-body oc-edit-form">

      <!-- 语种 Tabs -->
      <div id="edLangTabs" class="oc-lang-tabs"></div>
      <div id="edEnCoverWarn" class="oc-en-cover-warn" hidden>
        必须先上传英文（EN）产品主图才能保存。
      </div>

      <section class="oc-section oc-section-card">
        <div class="oc-section-title">必要信息<span class="req">*</span></div>
        <div class="oc-edit-hero-grid">
          <div class="oc-field">
            <label class="oc-label" for="edName">产品名称<span class="req">*</span></label>
            <input id="edName" class="oc-input" maxlength="120">
          </div>
          <div class="oc-field">
            <label class="oc-label" for="edCode">产品 ID<span class="req">*</span></label>
            <input id="edCode" class="oc-input" maxlength="64" autocomplete="off">
          </div>
        </div>
      </section>

      <div class="oc-edit-main-grid">
        <!-- 产品主图（JS 将按 activeLang 重渲染 edCoverBlock 内容） -->
        <section class="oc-section oc-section-card oc-edit-cover-panel" id="edCoverSection">
          <div class="oc-section-title">
            <span>产品主图</span>
            <span id="edCoverSectionHint" class="optional">(EN 必填，其他语种可选)</span>
          </div>
          <div id="edCoverBlock">
            <!-- 初始静态结构，openEditDetail 后由 renderCoverBlock() 替换 -->
            <div class="oc-cover-row">
              <div id="edCoverBox" class="oc-cover-square-480">
                <div id="edCoverDropzone" class="cover-dz" tabindex="0" role="button" aria-label="上传产品主图">
                  <div class="dz-icon"><svg width="18" height="18"><use href="#ic-upload"/></svg></div>
                  <div class="dz-title">点击或拖拽上传</div>
                  <div class="dz-hint">JPG / PNG / WebP</div>
                </div>
                <img id="edCoverImg" alt="主图" hidden>
              </div>
              <div class="oc-cover-actions">
                <button type="button" class="oc-btn ghost sm" id="edCoverReplace">更换主图</button>
                <div class="oc-url-row" style="margin-top:var(--oc-sp-2)">
                  <input type="url" id="edCoverUrl" class="oc-input sm" placeholder="粘贴图片 URL 导入…">
                  <button type="button" class="oc-btn ghost sm" id="edCoverFromUrlBtn">从 URL 导入</button>
                </div>
                <input type="file" id="edCoverInput" accept="image/*" hidden>
              </div>
            </div>
          </div>
        </section>

        <!-- 文案（JS 按 activeLang 过滤渲染） -->
        <section class="oc-section oc-section-card oc-edit-copy-panel" id="edCwSection">
          <div class="oc-section-title">
            <span>文案</span>
            <span class="optional" id="edCwLangLabel"></span>
            <span class="count" id="edCwBadge">0</span>
          </div>
          <div id="edCwList" class="oc-cw-grid"></div>
          <button class="oc-add-btn" type="button" id="edCwAddBtn">
            <svg width="14" height="14"><use href="#ic-plus"/></svg>
            <span>添加文案条目</span>
          </button>
        </section>
      </div>

      <!-- 视频素材（JS 按 activeLang 过滤渲染） -->
      <section class="oc-section oc-section-card" id="edItemsSection">
        <div class="oc-section-title">
          <span>视频素材</span>
          <span class="optional" id="edItemsLangLabel"></span>
          <span class="count" id="edItemsBadge">0</span>
        </div>

        <!-- 已上传素材列表 -->
        <div id="edItemsGrid" class="oc-items-grid" style="grid-template-columns:repeat(auto-fill, minmax(260px, 1fr)); gap:var(--oc-sp-4)"></div>

        <!-- 新增素材大框：视频封面图 + 视频源 + 提交按钮（两者都有才能提交） -->
        <div class="oc-new-item oc-edit-new-item" id="edNewItemBox">
          <div class="oc-new-item-title">新增素材</div>
          <div class="oc-new-item-body oc-edit-video-grid">
            <!-- 左：视频封面图 -->
            <div class="oc-new-item-col">
              <div class="oc-new-item-label">视频封面图<span class="req">*</span></div>
              <div id="edItemCoverBox" class="oc-cover-9-16">
                <div id="edItemCoverDropzone" class="cover-dz" tabindex="0" role="button" aria-label="上传视频封面图">
                  <div class="dz-icon"><svg width="18" height="18"><use href="#ic-upload"/></svg></div>
                  <div class="dz-title">点击或拖拽上传封面</div>
                  <div class="dz-hint">建议 9:16 / 1080×1920</div>
                </div>
                <img id="edItemCoverImg" alt="视频封面" hidden>
              </div>
              <div class="oc-cover-actions">
                <button type="button" class="oc-btn ghost sm" id="edItemCoverReplace" hidden>更换封面</button>
                <button type="button" class="oc-btn text sm" id="edItemCoverClear" hidden>清空</button>
              </div>
              <div class="oc-url-row">
                <input type="url" id="edItemCoverUrl" class="oc-input sm" placeholder="粘贴图片 URL 导入…">
                <button type="button" class="oc-btn ghost sm" id="edItemCoverFromUrlBtn">从 URL 导入</button>
              </div>
              <input type="file" id="edItemCoverInput" accept="image/*" hidden>
            </div>

            <!-- 右：视频源 -->
            <div class="oc-new-item-col">
              <div class="oc-new-item-label">视频源<span class="req">*</span></div>
              <div id="edVideoPickBox" class="oc-video-pick" tabindex="0" role="button" aria-label="选择视频源文件">
                <div id="edVideoPickEmpty" class="cover-dz">
                  <div class="dz-icon"><svg width="18" height="18"><use href="#ic-upload"/></svg></div>
                  <div class="dz-title">点击或拖拽选择视频</div>
                  <div class="dz-hint">mp4 / mov / webm / mkv</div>
                </div>
                <div id="edVideoPickFilled" class="oc-video-filled" hidden>
                  <div class="oc-video-filled-icon">
                    <svg width="28" height="28"><use href="#ic-film"/></svg>
                  </div>
                  <div class="oc-video-filled-name" id="edVideoPickName"></div>
                  <div class="oc-video-filled-size" id="edVideoPickSize"></div>
                  <button type="button" class="oc-btn text sm" id="edVideoPickClear">清空</button>
                </div>
              </div>
              <input type="file" id="edVideoInput" accept="video/*" hidden>
              <div class="oc-hint" style="margin-top:6px">只选不传，点击下方「提交新素材」才真正上传。</div>
            </div>
          </div>

          <!-- 上传进度 -->
          <div id="edUploadProgress" class="oc-upload-list"></div>

          <div class="oc-new-item-footer">
            <button type="button" class="oc-btn primary" id="edItemSubmitBtn">
              <svg width="14" height="14"><use href="#ic-plus"/></svg>
              <span>提交新素材</span>
            </button>
          </div>
        </div>
      </section>

    </div>

    <div class="oc-modal-foot oc-edit-modal-foot">
      <button class="oc-btn ghost" id="edCancelBtn">取消</button>
      <button class="oc-btn primary" id="edSaveBtn">
        <svg width="14" height="14"><use href="#ic-check"/></svg>
        <span>保存</span>
      </button>
    </div>
  </div>
</div>
