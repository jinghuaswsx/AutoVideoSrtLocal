{# 数据质量状态条共享组件
   Docs-anchor: docs/analytics-data-quality-guardrails.md

   用法：
   1. 在页面里 ``{% include "_data_quality_bar.html" %}``。
   2. 在 JS 里调用 ``window.renderDataQualityBar(payload.data_quality)``，
      传入接口顶层 ``data_quality`` 对象。``data_quality`` 缺失时按 unknown 处理。
#}
<style>
  .dq-bar { margin: 0 0 var(--space-4); }
  .dq-bar__shell {
    display: flex; align-items: flex-start; gap: var(--space-3);
    padding: var(--space-3) var(--space-4);
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    background: var(--bg-subtle);
  }
  .dq-bar__shell.is-ok       { background: var(--success-bg); border-color: transparent; }
  .dq-bar__shell.is-warning  { background: var(--warning-bg); border-color: transparent; }
  .dq-bar__shell.is-stale    { background: var(--warning-bg); border-color: transparent; }
  .dq-bar__shell.is-mismatch { background: var(--danger-bg);  border-color: transparent; }
  .dq-bar__shell.is-error    { background: var(--danger-bg);  border-color: transparent; }
  .dq-bar__shell.is-unknown  { background: var(--bg-muted);   border-color: var(--border); }
  .dq-bar__icon {
    width: 18px; height: 18px; flex: 0 0 18px; margin-top: 2px;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .dq-bar__body { flex: 1 1 auto; min-width: 0; }
  .dq-bar__title {
    font-weight: 600; font-size: var(--text-sm);
    display: flex; flex-wrap: wrap; align-items: center; gap: var(--space-2);
  }
  .dq-bar__shell.is-ok       .dq-bar__title { color: var(--success-fg); }
  .dq-bar__shell.is-warning  .dq-bar__title,
  .dq-bar__shell.is-stale    .dq-bar__title { color: var(--warning-fg); }
  .dq-bar__shell.is-mismatch .dq-bar__title,
  .dq-bar__shell.is-error    .dq-bar__title { color: var(--danger-fg); }
  .dq-bar__shell.is-unknown  .dq-bar__title { color: var(--fg-muted); }
  .dq-bar__chip {
    display: inline-flex; align-items: center; height: 20px; padding: 0 8px;
    border-radius: var(--radius-md); font-size: var(--text-xs); font-weight: 500;
    background: rgba(255,255,255,0.55); color: inherit;
  }
  .dq-bar__sub {
    margin-top: 4px; color: var(--fg-muted);
    font-size: var(--text-xs); line-height: var(--leading-tight);
  }
  .dq-bar__shell.is-mismatch .dq-bar__sub,
  .dq-bar__shell.is-error    .dq-bar__sub { color: var(--danger-fg); }
  .dq-bar__shell.is-warning  .dq-bar__sub,
  .dq-bar__shell.is-stale    .dq-bar__sub { color: var(--warning-fg); }
  .dq-bar__details {
    margin-top: var(--space-2);
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: var(--space-2);
    font-size: var(--text-xs);
    color: var(--fg-muted);
  }
  .dq-bar__details dt { font-weight: 500; }
  .dq-bar__details dd { margin: 0; font-variant-numeric: tabular-nums; }
  .dq-bar__toggle {
    background: transparent; border: 0; padding: 0; cursor: pointer;
    color: inherit; font: inherit; text-decoration: underline;
    text-underline-offset: 2px;
  }
</style>

<section class="dq-bar" data-dq-bar hidden aria-live="polite">
  <div class="dq-bar__shell is-unknown" data-dq-shell>
    <span class="dq-bar__icon" aria-hidden="true">●</span>
    <div class="dq-bar__body">
      <div class="dq-bar__title">
        <span data-dq-status-label>数据质量</span>
        <span class="dq-bar__chip" data-dq-source>—</span>
        <span class="dq-bar__chip" data-dq-range hidden></span>
        <button type="button" class="dq-bar__toggle" data-dq-toggle hidden>展开详情</button>
      </div>
      <div class="dq-bar__sub" data-dq-sub></div>
      <dl class="dq-bar__details" data-dq-details hidden></dl>
    </div>
  </div>
</section>

<script>
(function () {
  const STATUS_LABELS = {
    ok: '数据已校验',
    warning: '数据已展示（带未分摊或实时兜底）',
    stale: '派生数据滞后',
    mismatch: '跨表对账失败',
    error: '校验异常',
    unknown: '数据质量未知',
  };
  const SOURCE_LABELS = {
    daily_final: '日终广告表',
    realtime_snapshot: '实时快照兜底',
    mixed: '混合（部分日终 / 部分实时）',
    derived_cache: '派生缓存（已新鲜度校验）',
    unknown: '数据源未知',
  };

  function safeStatus(value) {
    return Object.prototype.hasOwnProperty.call(STATUS_LABELS, value) ? value : 'unknown';
  }
  function fmtTime(value) {
    if (!value) return '—';
    return String(value).replace('T', ' ').slice(0, 19);
  }

  function summarizeWatermarks(watermarks) {
    if (!watermarks || typeof watermarks !== 'object') return [];
    const map = [
      ['orders',           '订单',     'latest_business_date', 'latest_updated_at'],
      ['meta_daily_ads',   '广告日终', 'latest_business_date', 'latest_import_finished_at'],
      ['meta_realtime_ads','广告实时', 'latest_business_date', 'latest_snapshot_at'],
      ['derived_profit',   '派生利润', 'latest_business_date', 'latest_run_finished_at'],
    ];
    const out = [];
    for (const [key, label, dateKey, tsKey] of map) {
      const entry = watermarks[key];
      if (!entry || typeof entry !== 'object') continue;
      out.push({
        label,
        date: entry[dateKey] || '—',
        ts: fmtTime(entry[tsKey]),
      });
    }
    return out;
  }

  function buildSubtext(payload) {
    const parts = [];
    if (Array.isArray(payload.errors) && payload.errors.length) {
      payload.errors.slice(0, 2).forEach((e) => {
        if (e && e.message) parts.push(e.message);
      });
    }
    if (Array.isArray(payload.warnings) && payload.warnings.length) {
      payload.warnings.slice(0, 2).forEach((w) => {
        if (w && w.message) parts.push(w.message);
      });
    }
    if (parts.length === 0) {
      const generated = fmtTime(payload.generated_at);
      parts.push(`检验完成于 ${generated}`);
    }
    return parts.join('；');
  }

  function render(payload) {
    const root = document.querySelector('[data-dq-bar]');
    if (!root) return;
    const shell = root.querySelector('[data-dq-shell]');
    const statusLabel = root.querySelector('[data-dq-status-label]');
    const sourceChip = root.querySelector('[data-dq-source]');
    const rangeChip = root.querySelector('[data-dq-range]');
    const sub = root.querySelector('[data-dq-sub]');
    const toggle = root.querySelector('[data-dq-toggle]');
    const details = root.querySelector('[data-dq-details]');

    const dq = payload && typeof payload === 'object'
      ? payload
      : { status: 'unknown', source_mode: 'unknown' };
    const status = safeStatus(dq.status);
    const sourceMode = dq.source_mode || 'unknown';

    root.hidden = false;
    shell.classList.remove(
      'is-ok', 'is-warning', 'is-stale', 'is-mismatch', 'is-error', 'is-unknown',
    );
    shell.classList.add(`is-${status}`);
    statusLabel.textContent = STATUS_LABELS[status] || STATUS_LABELS.unknown;
    sourceChip.textContent = SOURCE_LABELS[sourceMode] || SOURCE_LABELS.unknown;

    const dateFrom = dq.business_date_from;
    const dateTo = dq.business_date_to;
    if (dateFrom && dateTo) {
      rangeChip.hidden = false;
      rangeChip.textContent = dateFrom === dateTo
        ? `业务日 ${dateFrom}`
        : `业务日 ${dateFrom} ~ ${dateTo}`;
    } else {
      rangeChip.hidden = true;
    }
    sub.textContent = buildSubtext(dq);

    const watermarkRows = summarizeWatermarks(dq.watermarks);
    if (watermarkRows.length) {
      details.innerHTML = watermarkRows.map(
        (row) => `<div><dt>${row.label} 水位</dt>`
          + `<dd>${row.date} <span style="opacity:.7">/ ${row.ts}</span></dd></div>`
      ).join('');
      toggle.hidden = false;
      toggle.onclick = () => {
        const expanded = !details.hidden;
        details.hidden = expanded;
        toggle.textContent = expanded ? '展开详情' : '收起详情';
      };
      if (details.hidden) toggle.textContent = '展开详情';
    } else {
      details.hidden = true;
      details.innerHTML = '';
      toggle.hidden = true;
    }
  }

  window.renderDataQualityBar = render;
})();
</script>
