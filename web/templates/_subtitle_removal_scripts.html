<script>
  (function () {
    if (typeof window === "undefined" || !window.io) return;
    var taskId = {{ task_id | default('') | tojson }};
    if (!taskId) return;
    var socket = window.io();
    var joinFn = function () {
      socket.emit("join_subtitle_removal_task", { task_id: taskId });
    };
    joinFn();
    socket.on("connect", joinFn);
  })();
</script>
