<script>
  (function () {
    var bootstrap = window.subtitleRemovalBootstrap || {};
    var page = document.querySelector("[data-subtitle-removal-page='detail']");
    var uploadInput = document.getElementById("srUploadInput");
    var uploadButton = document.getElementById("srPickVideoButton");
    var uploadDropzone = document.getElementById("srUploadDropzone");
    var uploadProgressPanel = document.getElementById("srUploadProgressPanel");
    var uploadProgressBar = document.getElementById("srUploadProgress");
    var uploadProgressText = document.getElementById("srUploadPercent");
    var uploadProgressLabel = document.getElementById("srUploadProgressLabel");
    var uploadMeta = document.getElementById("srUploadMeta");
    var uploadError = document.getElementById("srUploadError");

    function numberOrNull(value) {
      var next = Number(value);
      return Number.isFinite(next) ? next : null;
    }

    function normalizeSelectionBox(selectionBox, positionPayload) {
      var x1 = numberOrNull(selectionBox && (selectionBox.x1 != null ? selectionBox.x1 : selectionBox.l));
      var y1 = numberOrNull(selectionBox && (selectionBox.y1 != null ? selectionBox.y1 : selectionBox.t));
      var x2 = numberOrNull(selectionBox && selectionBox.x2);
      var y2 = numberOrNull(selectionBox && selectionBox.y2);
      var width = numberOrNull(selectionBox && selectionBox.w);
      var height = numberOrNull(selectionBox && selectionBox.h);

      if ((x1 == null || y1 == null || width == null || height == null) && positionPayload) {
        x1 = x1 == null ? numberOrNull(positionPayload.l) : x1;
        y1 = y1 == null ? numberOrNull(positionPayload.t) : y1;
        width = width == null ? numberOrNull(positionPayload.w) : width;
        height = height == null ? numberOrNull(positionPayload.h) : height;
      }

      if (x1 != null && y1 != null && x2 != null && y2 != null) {
        width = x2 - x1;
        height = y2 - y1;
      } else if (x1 != null && y1 != null && width != null && height != null) {
        x2 = x1 + width;
        y2 = y1 + height;
      }

      if (x1 == null || y1 == null || x2 == null || y2 == null) {
        return null;
      }
      width = x2 - x1;
      height = y2 - y1;
      if (width <= 0 || height <= 0) {
        return null;
      }
      return {
        l: Math.round(x1),
        t: Math.round(y1),
        w: Math.round(width),
        h: Math.round(height),
        x1: Math.round(x1),
        y1: Math.round(y1),
        x2: Math.round(x2),
        y2: Math.round(y2),
      };
    }

    function clearUploadError() {
      if (!uploadError) {
        return;
      }
      uploadError.textContent = "";
      uploadError.classList.add("sr-hidden");
    }

    function showUploadError(message) {
      if (!uploadError) {
        return;
      }
      uploadError.textContent = message || "上传失败";
      uploadError.classList.remove("sr-hidden");
    }

    function setUploadBusy(isBusy, labelText) {
      if (uploadButton) {
        uploadButton.disabled = !!isBusy;
        uploadButton.textContent = labelText || (isBusy ? "上传中…" : "选择视频并上传");
      }
    }

    function updateUploadProgress(percent, labelText) {
      if (uploadProgressPanel) {
        uploadProgressPanel.classList.remove("sr-hidden");
      }
      if (uploadProgressBar) {
        uploadProgressBar.style.width = Math.max(0, Math.min(100, percent || 0)) + "%";
      }
      if (uploadProgressText) {
        uploadProgressText.textContent = Math.max(0, Math.min(100, percent || 0)) + "%";
      }
      if (uploadProgressLabel && labelText) {
        uploadProgressLabel.textContent = labelText;
      }
    }

    function renderUploadFileMeta(file) {
      if (!uploadMeta || !file) {
        return;
      }
      uploadMeta.textContent = file.name + " · " + (file.size / 1024 / 1024).toFixed(1) + " MB";
    }

    function requestUploadBootstrap(file) {
      return fetch("/api/subtitle-removal/upload/bootstrap", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          original_filename: file.name,
          file_size: file.size,
          content_type: file.type || "application/octet-stream",
        }),
      }).then(function (response) {
        return response.json().then(function (data) {
          if (!response.ok) {
            throw new Error(data.error || "上传初始化失败");
          }
          return data;
        });
      });
    }

    function uploadFileToSignedUrl(file, bootstrapData) {
      return new Promise(function (resolve, reject) {
        var xhr = new XMLHttpRequest();
        xhr.open("PUT", bootstrapData.upload_url, true);
        var csrfMeta = document.querySelector('meta[name="csrf-token"]');
        if (csrfMeta) {
          xhr.setRequestHeader("X-CSRFToken", csrfMeta.getAttribute("content"));
        }
        xhr.upload.onprogress = function (event) {
          if (!event.lengthComputable) {
            return;
          }
          updateUploadProgress(Math.round((event.loaded / event.total) * 100), "视频直传中…");
        };
        xhr.onload = function () {
          if (xhr.status >= 200 && xhr.status < 300) {
            resolve();
            return;
          }
          reject(new Error("视频上传失败"));
        };
        xhr.onerror = function () {
          reject(new Error("网络异常，上传失败"));
        };
        xhr.send(file);
      });
    }

    function readUploadEraseType() {
      var inputs = document.querySelectorAll("input[name='erase_text_type']");
      for (var i = 0; i < inputs.length; i++) {
        if (inputs[i].checked) return inputs[i].value;
      }
      return "subtitle";
    }

    function readUploadSubtitleBackend() {
      var inputs = document.querySelectorAll("input[name='subtitle_backend']");
      for (var i = 0; i < inputs.length; i++) {
        if (inputs[i].checked) return inputs[i].value;
      }
      return "volc";
    }

    function bindUploadSubtitleBackendRadios() {
      var tabs = Array.prototype.slice.call(document.querySelectorAll("[data-role='subtitle-backend-tab']"));
      var inputs = Array.prototype.slice.call(document.querySelectorAll("input[name='subtitle_backend']"));
      function sync() {
        tabs.forEach(function (tab) {
          var input = tab.querySelector("input[name='subtitle_backend']");
          tab.classList.toggle("is-active", !!input && input.checked);
        });
      }
      inputs.forEach(function (input) {
        input.addEventListener("change", sync);
      });
      sync();
    }

    function bindUploadEraseTypeRadios() {
      var options = Array.prototype.slice.call(document.querySelectorAll("[data-role='erase-type-option']"));
      var inputs = Array.prototype.slice.call(document.querySelectorAll("input[name='erase_text_type']"));
      function sync() {
        options.forEach(function (opt) {
          var input = opt.querySelector("input[name='erase_text_type']");
          opt.classList.toggle("is-active", !!input && input.checked);
        });
      }
      inputs.forEach(function (input) {
        input.addEventListener("change", sync);
      });
      sync();
    }

    function completeSubtitleRemovalUpload(file, bootstrapData) {
      return fetch("/api/subtitle-removal/upload/complete", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          task_id: bootstrapData.task_id,
          object_key: bootstrapData.object_key,
          original_filename: file.name,
          file_size: file.size,
          content_type: file.type || "application/octet-stream",
          subtitle_backend: readUploadSubtitleBackend(),
          erase_text_type: readUploadEraseType(),
        }),
      }).then(function (response) {
        return response.json().then(function (data) {
          if (!response.ok) {
            throw new Error(data.error || "上传完成确认失败");
          }
          return data;
        });
      });
    }

    function handleUploadFile(file) {
      if (!file) {
        return Promise.resolve();
      }
      clearUploadError();
      renderUploadFileMeta(file);
      setUploadBusy(true, "准备上传…");
      updateUploadProgress(0, "正在申请上传地址…");
      return requestUploadBootstrap(file)
        .then(function (bootstrapData) {
          return uploadFileToSignedUrl(file, bootstrapData).then(function () {
            updateUploadProgress(100, "视频已上传，正在完成建档…");
            return completeSubtitleRemovalUpload(file, bootstrapData);
          });
        })
        .then(function (data) {
          window.location.href = `/subtitle-removal/${data.task_id}`;
        })
        .catch(function (error) {
          setUploadBusy(false, "重新选择视频");
          showUploadError(error.message || "上传失败");
        });
    }

    function initUploadPage() {
      if (!uploadInput || !uploadButton || !uploadDropzone) {
        return;
      }
      bindUploadSubtitleBackendRadios();
      bindUploadEraseTypeRadios();
      uploadButton.addEventListener("click", function (event) {
        event.preventDefault();
        event.stopPropagation();
        uploadInput.click();
      });
      uploadDropzone.addEventListener("click", function () {
        uploadInput.click();
      });
      uploadDropzone.addEventListener("keydown", function (event) {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          uploadInput.click();
        }
      });
      uploadInput.addEventListener("change", function () {
        if (uploadInput.files && uploadInput.files[0]) {
          handleUploadFile(uploadInput.files[0]);
        }
      });
      ["dragenter", "dragover"].forEach(function (eventName) {
        uploadDropzone.addEventListener(eventName, function (event) {
          event.preventDefault();
          uploadDropzone.classList.add("is-dragover");
        });
      });
      ["dragleave", "dragend", "drop"].forEach(function (eventName) {
        uploadDropzone.addEventListener(eventName, function (event) {
          event.preventDefault();
          if (eventName === "drop") {
            uploadDropzone.classList.remove("is-dragover");
            if (event.dataTransfer && event.dataTransfer.files && event.dataTransfer.files[0]) {
              handleUploadFile(event.dataTransfer.files[0]);
            }
            return;
          }
          uploadDropzone.classList.remove("is-dragover");
        });
      });
    }

    initUploadPage();
    window.normalizeSubtitleRemovalSelectionBox = normalizeSelectionBox;
    if (!page) {
      return;
    }

    var taskId = page.getAttribute("data-task-id") || bootstrap.id || "";
    var apiUrl = bootstrap.state_api_url || (taskId ? "/api/subtitle-removal/" + encodeURIComponent(taskId) : "");
    var selectionOverlay = document.getElementById("srSelectionOverlay");
    var selectionImage = document.getElementById("srSelectionImage");
    var selectionBoxEl = document.getElementById("srSelectionBox");
    var selectionEmpty = document.getElementById("srSelectionEmpty");
    var selectionCoords = document.getElementById("srSelectionCoords");
    var stateStatus = document.getElementById("srStateStatus");
    var stateMode = document.getElementById("srStateMode");
    var stateModeText = document.getElementById("srStateModeText");
    var stateResolution = document.getElementById("srStateResolution");
    var stateSelection = document.getElementById("srStateSelection");
    var stateHint = document.getElementById("srStateHint");
    var stateBackend = document.getElementById("srStateBackend");
    var resultPanel = document.getElementById("srResultPanel");
    var compareCard = document.getElementById("srCompareCard");
    var compareOriginalPanel = document.getElementById("srCompareOriginalPanel");
    var compareResultPanel = document.getElementById("srCompareResultPanel");
    var resumeButton = document.getElementById("srResumeSubtitleRemoval");
    var resubmitButton = document.getElementById("srResubmitSubtitleRemoval");
    var deleteButton = document.getElementById("srDeleteSubtitleRemoval");
    var submitButton = document.getElementById("srSubmitSubtitleRemoval");
    var modeInputs = Array.prototype.slice.call(document.querySelectorAll("input[name='remove_mode']"));
    var radioTiles = Array.prototype.slice.call(document.querySelectorAll(".sr-radio-tile"));
    var eraseTypeInputs = Array.prototype.slice.call(document.querySelectorAll("input[name='erase_text_type']"));
    var eraseTypeOptions = Array.prototype.slice.call(document.querySelectorAll("[data-role='erase-type-option']"));
    var stateEraseType = document.getElementById("srStateEraseType");

    var selectionState = {
      mode: bootstrap.remove_mode || "full",
      box: normalizeSelectionBox(bootstrap.selection_box, bootstrap.position_payload),
      dragging: false,
      start: null,
      current: null,
    };

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function pointInsideRect(point, rect) {
      if (!point || !rect) {
        return false;
      }
      return (
        point.x >= rect.left &&
        point.x <= rect.left + rect.width &&
        point.y >= rect.top &&
        point.y <= rect.top + rect.height
      );
    }

    function getMediaInfo() {
      return bootstrap.media_info || {};
    }

    function escapeHtml(text) {
      return String(text || "").replace(/[&<>"']/g, function (ch) {
        return {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;",
        }[ch];
      });
    }

    function getContainedImageRect(container, mediaInfo) {
      var width = Number(mediaInfo.width) || 0;
      var height = Number(mediaInfo.height) || 0;
      if (!width || !height || !container) {
        return null;
      }
      var containerWidth = container.clientWidth;
      var containerHeight = container.clientHeight;
      if (!containerWidth || !containerHeight) {
        return null;
      }
      var scale = Math.min(containerWidth / width, containerHeight / height);
      var renderedWidth = width * scale;
      var renderedHeight = height * scale;
      return {
        left: (containerWidth - renderedWidth) / 2,
        top: (containerHeight - renderedHeight) / 2,
        width: renderedWidth,
        height: renderedHeight,
      };
    }

    function selectionBoxToOverlayRect(selectionBox, imageRect, mediaInfo) {
      selectionBox = normalizeSelectionBox(selectionBox, null);
      if (!selectionBox || !imageRect) {
        return null;
      }
      var width = Number(mediaInfo.width) || 0;
      var height = Number(mediaInfo.height) || 0;
      if (!width || !height) {
        return null;
      }
      var scaleX = imageRect.width / width;
      var scaleY = imageRect.height / height;
      return {
        left: imageRect.left + selectionBox.l * scaleX,
        top: imageRect.top + selectionBox.t * scaleY,
        width: selectionBox.w * scaleX,
        height: selectionBox.h * scaleY,
      };
    }

    function computeSelectionBox(selection, imageRect, mediaInfo) {
      var width = Number(mediaInfo.width) || 0;
      var height = Number(mediaInfo.height) || 0;
      if (!selection || !imageRect || !width || !height) {
        return null;
      }

      var left = clamp(Math.min(selection.startX, selection.endX), imageRect.left, imageRect.left + imageRect.width);
      var top = clamp(Math.min(selection.startY, selection.endY), imageRect.top, imageRect.top + imageRect.height);
      var right = clamp(Math.max(selection.startX, selection.endX), imageRect.left, imageRect.left + imageRect.width);
      var bottom = clamp(Math.max(selection.startY, selection.endY), imageRect.top, imageRect.top + imageRect.height);
      var boxWidth = Math.max(0, right - left);
      var boxHeight = Math.max(0, bottom - top);

      if (!boxWidth || !boxHeight) {
        return null;
      }

      var scaleX = width / imageRect.width;
      var scaleY = height / imageRect.height;
      var normalizedLeft = Math.round((left - imageRect.left) * scaleX);
      var normalizedTop = Math.round((top - imageRect.top) * scaleY);
      var normalizedWidth = Math.round(boxWidth * scaleX);
      var normalizedHeight = Math.round(boxHeight * scaleY);
      var x2 = normalizedLeft + normalizedWidth;
      var y2 = normalizedTop + normalizedHeight;
      return {
        l: normalizedLeft,
        t: normalizedTop,
        w: normalizedWidth,
        h: normalizedHeight,
        x1: normalizedLeft,
        y1: normalizedTop,
        x2: x2,
        y2: y2,
      };
    }

    function updateSelectionBoxDisplay(rect) {
      if (!selectionBoxEl) {
        return;
      }
      if (!rect) {
        selectionBoxEl.hidden = true;
        selectionCoords.textContent = "未选择区域";
        stateSelection.textContent = "未选择区域";
        return;
      }
      selectionBoxEl.hidden = false;
      selectionBoxEl.style.left = rect.left + "px";
      selectionBoxEl.style.top = rect.top + "px";
      selectionBoxEl.style.width = rect.width + "px";
      selectionBoxEl.style.height = rect.height + "px";
      var text = "l:" + (selectionState.box ? selectionState.box.l : 0) + " t:" + (selectionState.box ? selectionState.box.t : 0) + " w:" + (selectionState.box ? selectionState.box.w : 0) + " h:" + (selectionState.box ? selectionState.box.h : 0);
      selectionCoords.textContent = text;
      stateSelection.textContent = text;
    }

    function getCurrentSelectionPayload() {
      return selectionState.box || normalizeSelectionBox(bootstrap.selection_box, bootstrap.position_payload) || null;
    }

    function getActionPayload() {
      var payload = {
        remove_mode: selectionState.mode,
        erase_text_type: currentEraseType(),
      };
      if (selectionState.mode === "box") {
        var box = getCurrentSelectionPayload();
        if (box) {
          payload.selection_box = box;
        }
      }
      return payload;
    }

    function postJson(url, payload) {
      return fetch(url, {
        method: "POST",
        headers: payload ? { "Content-Type": "application/json" } : {},
        body: payload ? JSON.stringify(payload) : null,
      }).then(function (response) {
        if (!response.ok) {
          return response.json().catch(function () { return {}; }).then(function (data) {
            throw new Error(data.error || "operation failed");
          });
        }
        return response.status === 204 ? null : response.json().catch(function () { return null; });
      });
    }

    function renderComparePreviews(state) {
      if (!compareCard || !compareOriginalPanel || !compareResultPanel) {
        return;
      }
      var sourceVideoUrl = (state && state.source_video_url) || "";
      var sourceThumbnailUrl = (state && state.thumbnail_url) || "";
      var resultPreviewUrl = (state && state.result_artifact_url) || "";
      var resultTosKey = (state && state.result_tos_key) || "";
      var resultVideoPath = (state && state.result_video_path) || "";
      var providerResultUrl = (state && state.provider_result_url) || "";
      var hasResult = !!(resultTosKey || resultVideoPath || providerResultUrl);

      if (!hasResult || !resultPreviewUrl) {
        compareCard.hidden = true;
        compareCard.classList.add("sr-hidden");
        compareOriginalPanel.innerHTML = "";
        compareResultPanel.innerHTML = "";
        return;
      }

      compareOriginalPanel.innerHTML = [
        '<div class="sr-compare-panel-head">',
        '<div class="sr-compare-panel-title">原视频预览</div>',
        '<div class="sr-compare-panel-hint">用来对比去字幕前的画面效果。</div>',
        '</div>',
        sourceVideoUrl
          ? '<div class="sr-preview-frame"><video class="sr-preview-video" controls playsinline src="' + escapeHtml(sourceVideoUrl) + '"></video></div>'
          : (
              sourceThumbnailUrl
                ? '<div class="sr-preview-frame"><img class="sr-preview-image" src="' + escapeHtml(sourceThumbnailUrl) + '" alt=""></div>'
                : '<div class="sr-result-empty"><div class="sr-selection-empty-title">原视频暂不可预览</div><div class="sr-hint">当前可先参考右侧结果视频。</div></div>'
            ),
      ].join("");

      compareResultPanel.innerHTML = [
        '<div class="sr-compare-panel-head">',
        '<div class="sr-compare-panel-title">结果视频预览</div>',
        '<div class="sr-compare-panel-hint">去字幕后的成品视频，方便直接比较前后差异。</div>',
        '</div>',
        '<div class="sr-preview-frame" data-role="result-frame"><video class="sr-preview-video" controls playsinline src="' + escapeHtml(resultPreviewUrl) + '"></video></div>',
      ].join("");
      var resultFrame = compareResultPanel.querySelector('[data-role="result-frame"]');
      var resultVideo = resultFrame && resultFrame.querySelector('video');
      if (resultVideo) {
        resultVideo.addEventListener('error', function () {
          resultFrame.innerHTML = '<div class="sr-result-empty"><div class="sr-selection-empty-title">结果视频暂不可用</div><div class="sr-hint">源链接可能已过期，请点「重提」重新生成，或用「下载结果」兜底。</div></div>';
        });
      }

      compareCard.hidden = false;
      compareCard.classList.remove("sr-hidden");
    }

    function renderResultPanel(state) {
      if (!resultPanel) {
        return;
      }
      var taskStatus = (state && state.status) || "";
      var providerTaskId = (state && state.provider_task_id) || "";
      var resultTosKey = (state && state.result_tos_key) || "";
      var resultVideoPath = (state && state.result_video_path) || "";
      var providerResultUrl = (state && state.provider_result_url) || "";
      var previewUrl = (state && state.result_artifact_url) || "";
      var downloadUrl = (state && state.result_download_url) || "";
      var providerStatus = (state && state.provider_status) || "";
      var providerMessage = (state && state.provider_emsg) || "";
      var html = "";
      var hasResult = !!(resultTosKey || resultVideoPath || providerResultUrl);

      if (taskStatus === "done" && hasResult) {
        html = [
          '<div class="sr-result-empty">',
          '<div class="sr-selection-empty-title">结果已准备好</div>',
          '</div>',
          '<div class="sr-result-copy">',
          '<div class="sr-hint">处理完成后可直接预览或下载。</div>',
          '<div class="sr-action-row">',
          '<a class="btn btn-primary" href="' + downloadUrl + '">下载结果</a>',
          '</div>',
          '</div>',
        ].join("");
      } else {
        html = [
          '<div class="sr-result-empty">',
          '<div class="sr-selection-empty-title">' + escapeHtml(providerTaskId ? "任务仍在处理中" : "暂无处理结果") + '</div>',
          '<div class="sr-hint">' + escapeHtml(providerMessage || providerStatus || "提交后会在这里显示预览和下载入口。") + '</div>',
          '</div>',
        ].join("");
      }

      resultPanel.innerHTML = html;
      if (resumeButton) {
        resumeButton.hidden = !(providerTaskId && taskStatus !== "done");
      }
      if (resubmitButton) {
        resubmitButton.hidden = taskStatus === "deleted";
      }
      if (deleteButton) {
        deleteButton.hidden = taskStatus === "deleted";
      }
    }

    function renderSubtitleRemovalState(state) {
      if (!state) {
        return;
      }
      bootstrap = Object.assign({}, bootstrap, state);
      if (stateStatus && state.status) {
        stateStatus.textContent = state.status;
      }
      if (stateBackend) {
        stateBackend.textContent = backendLabel((state && state.subtitle_backend) || "volc");
      }
      var mode = state.remove_mode || selectionState.mode || "full";
      selectionState.mode = mode;
      if (stateMode) {
        stateMode.textContent = mode === "box" ? "框选去除" : "全屏去除";
      }
      if (stateModeText) {
        stateModeText.textContent = mode === "box" ? "框选去除" : "全屏去除";
      }
      if (stateResolution) {
        stateResolution.textContent = (state.media_info && state.media_info.resolution) || "未读取";
      }
      if (stateHint) {
        stateHint.textContent = mode === "box" ? "请在首帧图上拖拽字幕区域" : "全屏去除将直接提交整帧";
      }
      if (selectionImage && state.thumbnail_url) {
        selectionImage.src = state.thumbnail_url;
        selectionImage.hidden = false;
      }
      if (selectionEmpty) {
        selectionEmpty.hidden = !!state.thumbnail_url;
      }
      if (state.remove_mode) {
        modeInputs.forEach(function (input) {
          input.checked = input.value === state.remove_mode;
        });
        radioTiles.forEach(function (tile) {
          var input = tile.querySelector("input[name='remove_mode']");
          tile.classList.toggle("is-active", !!input && input.checked);
        });
      }
      if (state.selection_box || state.position_payload) {
        selectionState.box = normalizeSelectionBox(state.selection_box, state.position_payload);
        var imageRect = getContainedImageRect(selectionOverlay, state.media_info || getMediaInfo());
        if (imageRect && selectionState.box) {
          updateSelectionBoxDisplay(selectionBoxToOverlayRect(selectionState.box, imageRect, state.media_info || getMediaInfo()));
        }
      }
      var nextEraseType = (state && state.erase_text_type) || "subtitle";
      syncEraseType(nextEraseType);
      var srStatus = (state && state.status) || "";
      var lockStates = { queued: 1, running: 1, submitted: 1, done: 1, error: 1 };
      setEraseTypeDisabled(!!lockStates[srStatus]);
      renderResultPanel(state);
      renderComparePreviews(state);
    }

    function syncMode(nextMode) {
      selectionState.mode = nextMode;
      if (nextMode !== "box") {
        selectionState.box = null;
        updateSelectionBoxDisplay(null);
      }
      modeInputs.forEach(function (input) {
        input.checked = input.value === nextMode;
      });
      radioTiles.forEach(function (tile) {
        var input = tile.querySelector("input[name='remove_mode']");
        tile.classList.toggle("is-active", !!input && input.checked);
      });
      if (stateMode) {
        stateMode.textContent = nextMode === "box" ? "框选去除" : "全屏去除";
      }
      if (stateModeText) {
        stateModeText.textContent = nextMode === "box" ? "框选去除" : "全屏去除";
      }
      if (stateHint) {
        stateHint.textContent = nextMode === "box" ? "请在首帧图上拖拽字幕区域" : "全屏去除将直接提交整帧";
      }
      window.subtitleRemovalState = Object.assign({}, window.subtitleRemovalState || {}, {
        remove_mode: selectionState.mode,
        selection_box: selectionState.box,
      });
    }

    function eraseTypeLabel(value) {
      if (value === "text") return "所有渲染文本";
      if (value === "subtitle") return "仅字幕";
      return "—";
    }

    function backendLabel(value) {
      if (value === "local_vsr") return "本地 VSR";
      return "火山";
    }

    function currentEraseType() {
      for (var i = 0; i < eraseTypeInputs.length; i++) {
        if (eraseTypeInputs[i].checked) return eraseTypeInputs[i].value;
      }
      return "subtitle";
    }

    function syncEraseType(nextValue) {
      eraseTypeInputs.forEach(function (input) {
        input.checked = input.value === nextValue;
      });
      eraseTypeOptions.forEach(function (opt) {
        var input = opt.querySelector("input[name='erase_text_type']");
        opt.classList.toggle("is-active", !!input && input.checked);
      });
      if (stateEraseType) {
        stateEraseType.textContent = eraseTypeLabel(nextValue);
      }
    }

    function setEraseTypeDisabled(disabled) {
      eraseTypeInputs.forEach(function (input) { input.disabled = !!disabled; });
      eraseTypeOptions.forEach(function (opt) { opt.classList.toggle("is-disabled", !!disabled); });
    }

    function refreshSubtitleRemovalState() {
      if (!apiUrl) {
        return Promise.resolve(null);
      }
      return fetch(apiUrl, { credentials: "same-origin" })
        .then(function (response) {
          if (!response.ok) {
            throw new Error("refresh failed");
          }
          return response.json();
        })
        .then(function (state) {
          renderSubtitleRemovalState(state);
          return state;
        })
        .catch(function () {
          return null;
        });
    }

    function getPointerPosition(event) {
      var rect = selectionOverlay.getBoundingClientRect();
      return {
        x: event.clientX - rect.left,
        y: event.clientY - rect.top,
      };
    }

    function updateDragSelection(event) {
      if (!selectionState.dragging) {
        return;
      }
      var pointer = getPointerPosition(event);
      selectionState.current = pointer;
      var mediaInfo = getMediaInfo();
      var imageRect = getContainedImageRect(selectionOverlay, mediaInfo);
      if (!imageRect) {
        return;
      }
      var box = computeSelectionBox(
        {
          startX: selectionState.start.x,
          startY: selectionState.start.y,
          endX: pointer.x,
          endY: pointer.y,
        },
        imageRect,
        mediaInfo
      );
      selectionState.box = box;
      if (box) {
        updateSelectionBoxDisplay(selectionBoxToOverlayRect(box, imageRect, mediaInfo));
      }
    }

    function finishDragSelection() {
      if (!selectionState.dragging) {
        return;
      }
      selectionState.dragging = false;
      var mediaInfo = getMediaInfo();
      var imageRect = getContainedImageRect(selectionOverlay, mediaInfo);
      if (!imageRect || !selectionState.box) {
        updateSelectionBoxDisplay(null);
        return;
      }
      updateSelectionBoxDisplay(selectionBoxToOverlayRect(selectionState.box, imageRect, mediaInfo));
      window.subtitleRemovalState = Object.assign({}, window.subtitleRemovalState || {}, {
        remove_mode: selectionState.mode,
        selection_box: selectionState.box,
      });
    }

    if (selectionOverlay) {
      selectionOverlay.addEventListener("pointerdown", function (event) {
        if (selectionState.mode !== "box") {
          return;
        }
        var mediaInfo = getMediaInfo();
        var imageRect = getContainedImageRect(selectionOverlay, mediaInfo);
        if (!imageRect) {
          return;
        }
        var pointer = getPointerPosition(event);
        if (!pointInsideRect(pointer, imageRect)) {
          return;
        }
        selectionState.dragging = true;
        selectionState.start = pointer;
        selectionState.current = pointer;
        selectionState.box = null;
        selectionBoxEl.hidden = false;
        selectionBoxEl.style.left = pointer.x + "px";
        selectionBoxEl.style.top = pointer.y + "px";
        selectionBoxEl.style.width = "0px";
        selectionBoxEl.style.height = "0px";
        event.preventDefault();
      });

      selectionOverlay.addEventListener("pointermove", updateDragSelection);
      selectionOverlay.addEventListener("pointerup", finishDragSelection);
      selectionOverlay.addEventListener("pointercancel", finishDragSelection);
      selectionOverlay.addEventListener("pointerleave", function () {
        if (selectionState.dragging) {
          finishDragSelection();
        }
      });
    }

    modeInputs.forEach(function (input) {
      input.addEventListener("change", function () {
        syncMode(input.value);
      });
    });

    eraseTypeInputs.forEach(function (input) {
      input.addEventListener("change", function () {
        syncEraseType(input.value);
      });
    });

    var submitError = document.getElementById("srSubmitError");
    function showSubmitError(msg) {
      if (!submitError) return;
      submitError.textContent = msg || "提交失败";
      submitError.classList.remove("sr-hidden");
    }
    function clearSubmitError() {
      if (!submitError) return;
      submitError.textContent = "";
      submitError.classList.add("sr-hidden");
    }

    if (submitButton) {
      submitButton.addEventListener("click", function () {
        if (submitButton.disabled) return;
        clearSubmitError();
        var url = taskId ? "/api/subtitle-removal/" + encodeURIComponent(taskId) + "/submit" : "";
        if (!url) {
          showSubmitError("任务 ID 缺失，无法提交");
          return;
        }
        submitButton.disabled = true;
        submitButton.textContent = "提交中…";
        postJson(url, getActionPayload())
          .then(function () {
            submitButton.textContent = "已提交";
            return refreshSubtitleRemovalState();
          })
          .catch(function (error) {
            submitButton.disabled = false;
            submitButton.textContent = "提交去字幕任务";
            showSubmitError(error.message || "提交失败，请重试");
          });
      });
    }

    if (resumeButton) {
      resumeButton.addEventListener("click", function () {
        var url = (bootstrap.resume_poll_url || (taskId ? "/api/subtitle-removal/" + encodeURIComponent(taskId) + "/resume-poll" : ""));
        postJson(url, null)
          .then(function () {
            return refreshSubtitleRemovalState();
          })
          .catch(function (error) {
            window.alert(error.message || "继续轮询失败");
          });
      });
    }

    if (resubmitButton) {
      resubmitButton.addEventListener("click", function () {
        setEraseTypeDisabled(false);
        var url = (bootstrap.resubmit_url || (taskId ? "/api/subtitle-removal/" + encodeURIComponent(taskId) + "/resubmit" : ""));
        postJson(url, getActionPayload())
          .then(function () {
            return refreshSubtitleRemovalState();
          })
          .catch(function (error) {
            window.alert(error.message || "重提失败");
          });
      });
    }

    if (deleteButton) {
      deleteButton.addEventListener("click", function () {
        if (!window.confirm("确认删除这个去字幕任务吗？")) {
          return;
        }
        var url = (bootstrap.delete_url || (taskId ? "/api/subtitle-removal/" + encodeURIComponent(taskId) : ""));
        fetch(url, { method: "DELETE" })
          .then(function (response) {
            if (!response.ok) {
              throw new Error("删除失败");
            }
            window.location.href = "/subtitle-removal";
          })
          .catch(function (error) {
            window.alert(error.message || "删除失败");
          });
      });
    }

    window.computeSelectionBox = computeSelectionBox;
    window.normalizeSubtitleRemovalSelectionBox = normalizeSelectionBox;
    window.renderSubtitleRemovalState = renderSubtitleRemovalState;
    window.refreshSubtitleRemovalState = refreshSubtitleRemovalState;
    window.subtitleRemovalState = Object.assign({}, bootstrap, {
      remove_mode: selectionState.mode,
      selection_box: selectionState.box,
    });

    if (window.io && taskId) {
      var socket = window.io();
      var joinFn = function () {
        socket.emit("join_subtitle_removal_task", { task_id: taskId });
      };
      joinFn();
      socket.on("connect", joinFn);
    }

    renderSubtitleRemovalState(bootstrap);
    syncMode(selectionState.mode);
    updateSelectionBoxDisplay(
      selectionState.box && selectionOverlay
        ? selectionBoxToOverlayRect(selectionState.box, getContainedImageRect(selectionOverlay, getMediaInfo()), getMediaInfo())
        : null
    );
    refreshSubtitleRemovalState();
  })();
</script>
