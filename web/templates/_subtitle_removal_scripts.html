<script>
  (function () {
    if (typeof window === "undefined" || !window.io) return;
    var socket = window.io();
    socket.emit("join_subtitle_removal_task", {task_id: "{{ task_id | default('') }}"});
    var joinBtn = document.getElementById("join-subtitle-removal-task");
    if (joinBtn) {
      joinBtn.addEventListener("click", function () {
        socket.emit("join_subtitle_removal_task", {task_id: "{{ task_id | default('') }}"});
      });
    }
  })();
</script>
