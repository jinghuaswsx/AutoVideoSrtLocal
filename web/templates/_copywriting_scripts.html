{# web/templates/_copywriting_scripts.html #}
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.min.js"></script>
<script>
const TASK_ID = "{{ task_id }}";
const socket = io();
socket.emit("join_copywriting_task", { task_id: TASK_ID });

let currentSegments = {{ task.copy.segments | tojson if task.copy and task.copy.segments else '[]' }};
let rewriteIndex = -1;

// ── SocketIO 事件处理 ────────────────────────────

socket.on("cw_step_update", function(data) {
    if (data.task_id !== TASK_ID) return;
    updateStepUI(data.step, data.status, data.message);
});

socket.on("cw_keyframes_ready", function(data) {
    if (data.task_id !== TASK_ID) return;
    const row = document.getElementById("keyframesRow");
    row.innerHTML = "";
    for (let i = 0; i < data.count; i++) {
        const img = document.createElement("img");
        img.className = "cw-keyframe-thumb";
        img.src = "/api/copywriting/" + TASK_ID + "/keyframe/" + i;
        row.appendChild(img);
    }
});

socket.on("cw_copy_ready", function(data) {
    if (data.task_id !== TASK_ID) return;
    currentSegments = data.copy.segments || [];
    renderSegments(currentSegments);
    enableButtons(true);
    hideOverlay();
    // 切换：隐藏配置面板，显示编辑区
    document.getElementById("configSection").style.display = "none";
    document.getElementById("editorSection").style.display = "block";
    // 显示调试信息
    if (data.copy && data.copy._debug) showDebugInfo(data.copy._debug);
});

socket.on("cw_tts_ready", function(data) {
    if (data.task_id !== TASK_ID) return;
    document.getElementById("resultSection").style.display = "block";
    const audio = document.getElementById("resultAudio");
    audio.src = "/api/copywriting/" + TASK_ID + "/artifact/tts_audio";
    audio.style.display = "block";
});

socket.on("cw_compose_ready", function(data) {
    if (data.task_id !== TASK_ID) return;
    hideOverlay();
    const video = document.getElementById("resultVideo");
    video.src = "/api/copywriting/" + TASK_ID + "/artifact/video";
    video.style.display = "block";
    const dlRow = document.getElementById("downloadRow");
    dlRow.style.display = "flex";
    document.getElementById("dlVideo").href = "/api/copywriting/" + TASK_ID + "/download/soft_video";
    document.getElementById("dlCopy").href = "/api/copywriting/" + TASK_ID + "/download/copy";
    document.getElementById("btnTTS").disabled = false;
    document.getElementById("btnTTS").textContent = "▶ 生成语音视频";
});

socket.on("cw_error", function(data) {
    if (data.task_id !== TASK_ID) return;
    hideOverlay();
    alert("错误: " + (data.message || "未知错误"));
    enableButtons(true);
});

// ── UI 更新 ──────────────────────────────────────

function showOverlay(text) {
    const overlay = document.getElementById("editorOverlay");
    document.getElementById("overlayText").textContent = text || "处理中...";
    overlay.classList.add("active");
}
function hideOverlay() {
    document.getElementById("editorOverlay").classList.remove("active");
}

function updateStepUI(step, status, message) {
    const el = document.getElementById("step-" + step);
    if (!el) return;
    el.className = "cw-step";
    if (status === "done") el.classList.add("done");
    else if (status === "running") el.classList.add("active");
    else if (status === "error") el.classList.add("error");

    // 遮罩控制
    if (step === "keyframe" && status === "running") showOverlay("正在抽取关键帧...");
    if (step === "copywrite" && status === "running") showOverlay("正在生成文案...");
    if (step === "tts" && status === "running") showOverlay("正在生成语音...");
    if (step === "compose" && status === "running") showOverlay("正在合成视频...");
    if (status === "done" && (step === "copywrite" || step === "compose")) hideOverlay();
    if (status === "error") hideOverlay();

    if (status === "running") {
        const loading = document.getElementById("copyLoading");
        if (loading) loading.innerHTML = '<span class="cw-spinner"></span>' + (message || "处理中...");
    }
}

function renderSegments(segments) {
    const container = document.getElementById("segmentsContainer");
    container.innerHTML = "";
    segments.forEach(function(seg, i) {
        const div = document.createElement("div");
        div.className = "cw-segment";
        div.dataset.index = i;
        div.innerHTML =
            '<div class="cw-seg-label">' + seg.label + '</div>' +
            '<div class="cw-seg-text" id="segText' + i + '">' + escapeHtml(seg.text) + '</div>' +
            '<div class="cw-seg-duration">' + (seg.duration_hint || 0).toFixed(1) + 's</div>' +
            '<div class="cw-seg-actions">' +
            '<button class="cw-seg-btn" onclick="startEdit(' + i + ')">✏️</button>' +
            '<button class="cw-seg-btn" onclick="openRewrite(' + i + ')">🔄</button>' +
            '</div>';
        container.appendChild(div);
    });
}

function enableButtons(enabled) {
    document.getElementById("btnExport").disabled = !enabled;
    document.getElementById("btnDownload").disabled = !enabled;
    document.getElementById("btnTTS").disabled = !enabled;
    document.getElementById("btnRegenerate").disabled = !enabled;
}

function escapeHtml(text) {
    const d = document.createElement("div");
    d.textContent = text;
    return d.innerHTML;
}

// ── 素材区折叠 ──────────────────────────────────

let materialsOpen = true;
function toggleMaterials() {
    materialsOpen = !materialsOpen;
    document.getElementById("materialsBody").classList.toggle("collapsed", !materialsOpen);
    document.getElementById("materialsToggle").textContent = materialsOpen ? "▼ 收起" : "▶ 展开";
}

// ── 文案操作 ─────────────────────────────────────

function regenerateCopy() {
    if (!confirm("重新生成将覆盖当前文案，确定？")) return;
    showOverlay("正在重新生成文案...");
    document.getElementById("btnRegenerate").disabled = true;
    const promptId = document.getElementById("promptSelect").value;
    fetch("/api/copywriting/" + TASK_ID + "/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt_id: promptId || null }),
    });
}

function startEdit(index) {
    const el = document.getElementById("segText" + index);
    el.contentEditable = "true";
    el.focus();
    el.addEventListener("blur", function handler() {
        el.contentEditable = "false";
        currentSegments[index].text = el.textContent.trim();
        saveCopy();
        el.removeEventListener("blur", handler);
    }, { once: true });
}

function saveCopy() {
    fetch("/api/copywriting/" + TASK_ID + "/segments", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ segments: currentSegments }),
    });
}

function openRewrite(index) {
    rewriteIndex = index;
    document.getElementById("rewriteOriginal").textContent =
        "[" + currentSegments[index].label + "] " + currentSegments[index].text;
    document.getElementById("rewriteInstruction").value = "";
    document.getElementById("rewriteModal").style.display = "flex";
}

function closeRewrite() {
    document.getElementById("rewriteModal").style.display = "none";
    rewriteIndex = -1;
}

async function confirmRewrite() {
    if (rewriteIndex < 0) return;
    const btn = document.getElementById("btnConfirmRewrite");
    btn.disabled = true;
    btn.textContent = "重写中...";
    try {
        const resp = await fetch("/api/copywriting/" + TASK_ID + "/rewrite-segment", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                index: rewriteIndex,
                instruction: document.getElementById("rewriteInstruction").value,
            }),
        });
        const data = await resp.json();
        if (data.segment) {
            currentSegments[rewriteIndex] = data.segment;
            currentSegments[rewriteIndex].index = rewriteIndex;
            renderSegments(currentSegments);
        }
    } catch (err) {
        alert("重写失败: " + err.message);
    } finally {
        btn.disabled = false;
        btn.textContent = "重写";
        closeRewrite();
    }
}

function exportCopy() {
    const text = currentSegments.map(s => "[" + s.label + "]\n" + s.text).join("\n\n");
    navigator.clipboard.writeText(text).then(() => alert("已复制到剪贴板"));
}

function downloadCopy() {
    window.open("/api/copywriting/" + TASK_ID + "/download/copy");
}

function startTTS() {
    showOverlay("正在生成语音视频...");
    document.getElementById("btnTTS").disabled = true;
    document.getElementById("btnTTS").textContent = "生成中...";
    fetch("/api/copywriting/" + TASK_ID + "/tts", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({}),
    });
}

function setLanguage(lang) {
    document.querySelectorAll(".cw-lang-btn").forEach(b => b.classList.remove("active"));
    event.target.classList.add("active");
    fetch("/api/copywriting/" + TASK_ID + "/inputs", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ language: lang }),
    });
    // 更新提示词预览
    updatePromptPreview();
}

// ── 模型选择 ────────────────────────────────────

function getSelectedModel() {
    const sel = document.getElementById("modelSelect");
    const val = sel ? sel.value : "openrouter:";
    const idx = val.indexOf(":");
    return {
        provider: val.substring(0, idx),
        model: val.substring(idx + 1) || null,
    };
}

function onModelChange() {
    const { provider, model } = getSelectedModel();
    const hint = document.getElementById("modelHint");
    if (!hint) return;
    if (model && model.includes("gemini")) {
        hint.textContent = "支持直接视频输入 + 图片输入（Vision）";
        hint.style.color = "#16a34a";
    } else if (provider === "doubao") {
        hint.textContent = "支持直接视频输入 + 图片输入（需上传到 TOS）";
        hint.style.color = "#16a34a";
    } else {
        hint.textContent = "支持图片输入（Vision），不支持视频";
        hint.style.color = "#9ca3af";
    }
}
onModelChange();

// ── 提示词加载 & 预览 ──────────────────────────

let promptsData = [];
const DEFAULT_PROMPT_EN = {{ default_prompt_en | tojson }};
const DEFAULT_PROMPT_ZH = {{ default_prompt_zh | tojson }};

async function loadPrompts() {
    try {
        const resp = await fetch("/api/prompts?type=copywriting");
        const data = await resp.json();
        promptsData = data.prompts || [];
        const select = document.getElementById("promptSelect");
        promptsData.forEach(function(p) {
            const opt = document.createElement("option");
            opt.value = p.id;
            opt.textContent = p.name;
            select.appendChild(opt);
        });
        updatePromptPreview();
    } catch(e) { /* ignore */ }
}

function onPromptChange() {
    updatePromptPreview();
}

function updatePromptPreview() {
    const preview = document.getElementById("promptPreview");
    if (!preview) return;
    const selectEl = document.getElementById("promptSelect");
    const promptId = selectEl ? selectEl.value : "";
    const isZh = document.querySelector(".cw-lang-btn.active");
    const lang = (isZh && isZh.textContent.trim() === "中文") ? "zh" : "en";

    if (!promptId) {
        preview.value = lang === "zh" ? DEFAULT_PROMPT_ZH : DEFAULT_PROMPT_EN;
        return;
    }
    const found = promptsData.find(p => String(p.id) === String(promptId));
    if (found) {
        if (lang === "zh" && found.prompt_text_zh) {
            preview.value = found.prompt_text_zh;
        } else {
            preview.value = found.prompt_text || "";
        }
    }
}

// ── 预览 & 确认生成 ──────────────────────────────

async function startGenerate() {
    const btn = document.getElementById("btnStartGenerate");
    btn.disabled = true;
    btn.textContent = "加载预览...";

    const promptId = document.getElementById("promptSelect").value;
    const { provider, model } = getSelectedModel();
    try {
        const resp = await fetch("/api/copywriting/" + TASK_ID + "/preview", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt_id: promptId || null, provider: provider, model: model }),
        });
        const data = await resp.json();
        showPreviewModal(data, promptId, provider, model);
    } catch(err) {
        alert("预览失败: " + err.message);
    } finally {
        btn.disabled = false;
        btn.textContent = "开始生成文案";
    }
}

function showPreviewModal(data, promptId, provider, model) {
    // 模型
    document.getElementById("previewModel").textContent = (data.provider || "") + " / " + (data.model || "");

    // 系统提示词
    document.getElementById("previewSystemPrompt").textContent = data.system_prompt || "-";

    // 用户消息
    const userContent = (data.user_content || []).map(function(item) {
        if (item.type === "text") return "[TEXT] " + item.text;
        if (item.type === "image") return "[IMAGE] " + item.file;
        return JSON.stringify(item);
    }).join("\n\n");
    document.getElementById("previewUserContent").textContent = userContent || "-";

    // 资源
    const res = data.resources || {};
    const lines = [];
    if (res.video_input) {
        lines.push("输入方式: 直接视频输入");
        lines.push("视频文件: " + (res.video || "-") + " (" + (res.video_size_mb || "?") + " MB)");
    } else if (res.vision_enabled) {
        lines.push("输入方式: 关键帧图片");
        lines.push("关键帧: " + res.keyframe_count + " 张 (" + (res.keyframes || []).join(", ") + ")");
    } else {
        lines.push("输入方式: 纯文本（不支持图片/视频）");
    }
    if (res.product_image) lines.push("商品主图: " + res.product_image);
    const inputs = res.product_inputs || {};
    if (Object.keys(inputs).length) {
        lines.push("商品信息: " + JSON.stringify(inputs, null, 2));
    } else {
        lines.push("商品信息: 无");
    }
    document.getElementById("previewResources").textContent = lines.join("\n");

    // 参数
    const params = data.parameters || {};
    document.getElementById("previewParams").textContent = JSON.stringify(params, null, 2);

    // 保存 promptId、provider、model 用于确认
    const modal = document.getElementById("previewModal");
    modal.dataset.promptId = promptId || "";
    modal.dataset.provider = provider || "openrouter";
    modal.dataset.model = model || "";
    modal.classList.add("open");
}

function closePreview() {
    document.getElementById("previewModal").classList.remove("open");
}

function confirmGenerate() {
    const modal = document.getElementById("previewModal");
    const promptId = modal.dataset.promptId;
    const provider = modal.dataset.provider;
    const model = modal.dataset.model;
    closePreview();

    const configOverlay = document.getElementById("configOverlay");
    document.getElementById("configOverlayText").textContent = "正在生成文案...";
    configOverlay.classList.add("active");
    document.getElementById("btnStartGenerate").disabled = true;
    document.getElementById("btnStartGenerate").textContent = "生成中...";

    fetch("/api/copywriting/" + TASK_ID + "/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt_id: promptId || null, provider: provider, model: model || null }),
    });
}

// ── 调试面板 ─────────────────────────────────────

let debugOpen = false;
function toggleDebug() {
    debugOpen = !debugOpen;
    document.getElementById("debugContent").classList.toggle("active", debugOpen);
    document.getElementById("debugToggle").textContent = debugOpen ? "▼ 收起" : "▶ 展开";
}

function showDebugInfo(debug) {
    if (!debug) return;
    document.getElementById("debugPanel").style.display = "block";
    document.getElementById("debugModel").textContent = (debug.provider || "") + " / " + (debug.model || "");
    document.getElementById("debugSystemPrompt").textContent = debug.system_prompt || "-";
    const userContent = (debug.user_content || []).map(function(item) {
        if (item.type === "text") return "[TEXT] " + item.text;
        if (item.type === "image") return "[IMAGE] " + (item.info || item.file || "");
        return JSON.stringify(item);
    }).join("\n\n");
    document.getElementById("debugUserContent").textContent = userContent || "-";
    const resources = [];
    if (debug.image_count > 0) resources.push("关键帧图片: " + debug.image_count + " 张");
    if (debug.keyframe_paths && debug.keyframe_paths.length) {
        resources.push("帧文件: " + debug.keyframe_paths.join(", "));
    }
    document.getElementById("debugResources").textContent = resources.join("\n") || "无资源文件";
    // 完整请求报文
    if (debug.full_request) {
        document.getElementById("debugFullRequest").textContent = JSON.stringify(debug.full_request, null, 2);
    }
    // 保存到全局供下载
    window._lastDebugInfo = debug;
}

function downloadDebugReport() {
    const debug = window._lastDebugInfo;
    if (!debug) { alert("暂无报文数据"); return; }

    let report = "=== 文案生成请求报文 ===\n";
    report += "时间: " + new Date().toISOString() + "\n";
    report += "任务ID: " + TASK_ID + "\n\n";

    report += "--- 模型 ---\n";
    report += "Provider: " + (debug.provider || "-") + "\n";
    report += "Model: " + (debug.model || "-") + "\n\n";

    report += "--- 系统提示词 ---\n";
    report += (debug.system_prompt || "-") + "\n\n";

    report += "--- 用户消息内容 ---\n";
    (debug.user_content || []).forEach(function(item, i) {
        if (item.type === "text") report += "[TEXT " + i + "] " + item.text + "\n\n";
        else if (item.type === "image") report += "[IMAGE " + i + "] " + (item.info || item.file || "") + "\n";
        else if (item.type === "video") report += "[VIDEO " + i + "] " + (item.info || item.file || "") + "\n";
    });
    report += "\n";

    report += "--- 资源 ---\n";
    report += "视频输入: " + (debug.video_input ? "是 (" + debug.video_file + ")" : "否") + "\n";
    report += "图片数: " + (debug.image_count || 0) + "\n";
    if (debug.keyframe_paths && debug.keyframe_paths.length) {
        report += "关键帧: " + debug.keyframe_paths.join(", ") + "\n";
    }
    report += "\n";

    if (debug.full_request) {
        report += "--- 完整 HTTP 请求 ---\n";
        report += JSON.stringify(debug.full_request, null, 2) + "\n\n";
    }

    // curl 命令
    if (debug.full_request) {
        const req = debug.full_request;
        report += "--- cURL 命令（替换 API Key） ---\n";
        report += "curl -X POST '" + (req.endpoint || "") + "' \\\n";
        report += "  -H 'Authorization: Bearer YOUR_API_KEY' \\\n";
        report += "  -H 'Content-Type: application/json' \\\n";
        report += "  -d '" + JSON.stringify(req.body).replace(/'/g, "'\\''") + "'\n";
    }

    const blob = new Blob([report], { type: "text/plain;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = TASK_ID + "_request_report.txt";
    a.click();
    URL.revokeObjectURL(url);
}

loadPrompts();

// 页面加载时，如果正在抽帧/生成中，显示遮罩
(function() {
    {% if task.steps.get('keyframe') == 'running' %}
    document.getElementById("configOverlay").classList.add("active");
    document.getElementById("configOverlayText").textContent = "正在抽取关键帧...";
    {% elif task.steps.get('copywrite') == 'running' %}
    document.getElementById("configOverlay").classList.add("active");
    document.getElementById("configOverlayText").textContent = "正在生成文案...";
    {% endif %}

    // 如果已有调试信息
    {% if task.copy and task.copy._debug %}
    showDebugInfo({{ task.copy._debug | tojson }});
    {% endif %}
})();
</script>
