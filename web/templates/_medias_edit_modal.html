<div class="oc-modal-mask oc" id="editMask" hidden>
  <div class="oc-modal oc-modal-narrow oc-modal-add" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="oc-modal-head">
      <h3 id="modalTitle">添加产品素材</h3>
      <button class="oc-icon-btn" id="modalClose" title="关闭" aria-label="关闭">
        <svg width="16" height="16"><use href="#ic-close"/></svg>
      </button>
    </div>

    <div class="oc-modal-body oc-add-form">
      <section class="oc-section oc-section-card">
        <div class="oc-section-title">必要信息<span class="req">*</span></div>
        <div class="oc-add-hero-grid">
          <div class="oc-field">
            <label class="oc-label" for="mName">产品名称<span class="req">*</span></label>
            <input id="mName" class="oc-input" maxlength="120" placeholder="例如：兰蔻小黑瓶精华">
          </div>
          <div class="oc-field">
            <label class="oc-label" for="mCode">产品 ID<span class="req">*</span></label>
            <input id="mCode" class="oc-input" maxlength="128" placeholder="sonic-lens-refresher" autocomplete="off">
            <div class="oc-hint">小写字母、数字和连字符，3–128 字符，如 <code>sonic-lens-refresher</code></div>
          </div>
        </div>
      </section>

      <div class="oc-add-main-grid">
        <section class="oc-section oc-section-card oc-add-panel">
          <div class="oc-section-title">商品主图<span class="req">*</span></div>
          <div class="oc-add-cover-stack">
            <div id="coverBox" class="oc-cover-square-480">
              <div id="coverDropzone" class="cover-dz" tabindex="0" role="button" aria-label="上传商品主图">
                <div class="dz-icon"><svg width="18" height="18"><use href="#ic-upload"/></svg></div>
                <div class="dz-title">点击或拖拽上传商品主图</div>
                <div class="dz-hint">建议正方形，JPG / PNG / WebP</div>
              </div>
              <img id="coverImg" alt="商品主图" hidden>
            </div>
            <div class="oc-cover-actions">
              <button type="button" class="oc-btn ghost sm" id="coverReplace" hidden>更换主图</button>
            </div>
            <div class="oc-url-row">
              <input type="url" id="coverUrl" class="oc-input sm" placeholder="粘贴图片 URL 导入…">
              <button type="button" class="oc-btn ghost sm" id="coverFromUrlBtn">从 URL 导入</button>
            </div>
            <input type="file" id="coverInput" accept="image/*" hidden>
          </div>
        </section>

        <section class="oc-section oc-section-card oc-add-panel">
          <div class="oc-section-head oc-section-head-between">
            <div class="oc-section-title">
              <span>文案<span class="optional">可选</span></span>
            </div>
            <button type="button" class="oc-btn ghost sm" id="mkCopyFetchBtn">
              <svg width="14" height="14"><use href="#ic-search"/></svg>
              <span>一键从明空后台获取英文文案</span>
            </button>
          </div>
          <textarea id="cwBody" class="oc-textarea oc-cw-body" rows="4"
                    placeholder="没有可以留空；填写后会跟产品一起提交。"></textarea>
        </section>
      </div>

      <!-- 隐藏的单条文案兼容位：渲染/收集函数仍引用这些 id，避免报错 -->
      <div id="cwList" hidden></div>
      <span id="cwBadge" hidden>0</span>
      <button id="cwAddBtn" type="button" hidden></button>

      <!-- 商品详情图（仅英文原始版，用于后续图片翻译） -->
      <section class="oc-section oc-section-card">
        <div class="oc-section-title">
          <span>商品详情图</span>
          <span class="optional">(英文原始版，用于后续图片翻译)</span>
          <span class="count" id="mDetailImagesBadge">0</span>
        </div>
        <div id="mDetailImagesGrid" class="oc-detail-images-grid"></div>
        <div class="oc-detail-images-actions">
          <button type="button" class="oc-btn ghost sm" id="mDetailImagesPickBtn">
            <svg width="14" height="14"><use href="#ic-upload"/></svg>
            <span>选择图片批量上传</span>
          </button>
          <span class="oc-hint">JPG / PNG / WebP，最多 50 张，单张 ≤ 15MB</span>
        </div>
        <input type="file" id="mDetailImagesInput"
               accept="image/jpeg,image/png,image/webp" multiple hidden>
        <div id="mDetailImagesProgress" class="oc-upload-list" hidden></div>
      </section>

      <section class="oc-section oc-section-card">
        <div class="oc-section-title">
          <span>视频素材<span class="req">*</span></span>
          <span class="oc-badge" id="itemsBadge" style="margin-left:auto">0</span>
        </div>

        <div class="oc-add-video-grid">
          <div class="oc-add-video-col">
            <div class="oc-new-item-label">视频封面图<span class="req">*</span></div>
            <div id="itemCoverBox" class="oc-cover-9-16">
              <div id="itemCoverDropzone" class="cover-dz" tabindex="0" role="button" aria-label="上传视频封面图">
                <div class="dz-icon"><svg width="18" height="18"><use href="#ic-upload"/></svg></div>
                <div class="dz-title">点击或拖拽上传封面</div>
                <div class="dz-hint">建议 9:16 / 1080×1920</div>
              </div>
              <img id="itemCoverImg" alt="视频封面" hidden>
            </div>
            <div class="oc-cover-actions">
              <button type="button" class="oc-btn ghost sm" id="itemCoverReplace" hidden>更换封面</button>
              <button type="button" class="oc-btn text sm" id="itemCoverClear" hidden>清空</button>
            </div>
            <div class="oc-url-row">
              <input type="url" id="itemCoverUrl" class="oc-input sm" placeholder="粘贴图片 URL 导入…">
              <button type="button" class="oc-btn ghost sm" id="itemCoverFromUrlBtn">从 URL 导入</button>
            </div>
            <input type="file" id="itemCoverInput" accept="image/*" hidden>
          </div>

          <div class="oc-add-video-col">
            <div class="oc-new-item-label">视频源<span class="req">*</span></div>
            <div id="dropzone" class="oc-dropzone oc-add-video-dropzone" tabindex="0" role="button" aria-label="上传视频素材">
              <div class="dz-icon"><svg width="18" height="18"><use href="#ic-upload"/></svg></div>
              <div class="dz-title">点击或拖拽上传视频</div>
              <div class="dz-hint">支持 MP4 / MOV / WebM</div>
              <input type="file" id="fileInput" accept="video/*" multiple hidden>
            </div>
            <div class="oc-hint">先上传封面，再选视频文件即触发上传。</div>
          </div>
        </div>

        <div id="uploadProgress" style="margin-top:var(--oc-sp-3)"></div>
        <div id="itemsGrid" class="oc-items-grid" style="grid-template-columns:repeat(auto-fill, minmax(260px, 1fr)); gap:var(--oc-sp-4); margin-top:var(--oc-sp-3)"></div>
      </section>
    </div>

    <div class="oc-modal-foot oc-add-modal-foot">
      <button class="oc-btn ghost" id="cancelBtn">取消</button>
      <button class="oc-btn primary" id="saveBtn">
        <svg width="14" height="14"><use href="#ic-check"/></svg>
        <span>保存</span>
      </button>
    </div>
  </div>
</div>
