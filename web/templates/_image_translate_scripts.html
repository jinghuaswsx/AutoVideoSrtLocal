<script>
(function(){
  var pageEl = document.querySelector("[data-page^='image-translate']");
  if (!pageEl) return;
  var pageType = pageEl.getAttribute("data-page");
  function parseJsonResponse(r){
    return r.json().catch(function(){ return {}; }).then(function(d){
      return {ok:r.ok, body:d};
    });
  }
  function channelAllowsParallel(channel) {
    return channel === "openrouter" || channel === "apimart";
  }

  if (pageType === "image-translate-list") {
    var state = { files: [] };
    var maxFiles = 1000;

    var productNameEl = document.getElementById("itProductName");
    var presetEl = document.getElementById("itPreset");
    var langEl = document.getElementById("itLanguage");
    var channelEl = document.getElementById("itChannel");
    var modelEl = document.getElementById("itModel");
    var presetPills = document.getElementById("itPresetPills");
    var langPills = document.getElementById("itLanguagePills");
    var langEmpty = document.getElementById("itLanguageEmpty");
    var channelPills = document.getElementById("itChannelPills");
    var modelPills = document.getElementById("itModelPills");
    var concurrencyEl = document.getElementById("itConcurrencyMode");
    var concurrencyPills = document.getElementById("itConcurrencyPills");
    var promptEl = document.getElementById("itPrompt");
    var fileInput = document.getElementById("itFileInput");
    var thumbsEl = document.getElementById("itThumbs");
    var submitBtn = document.getElementById("itSubmit");
    var errEl = document.getElementById("itError");
    var hintEl = document.getElementById("itHint");

    function showError(msg){ errEl.textContent = msg; errEl.style.display = msg ? "block" : "none"; }
    function clearError(){ showError(""); }

    function setPillActive(groupEl, value) {
      var pills = groupEl.querySelectorAll(".it-pill");
      pills.forEach(function(p){
        var active = p.getAttribute("data-value") === value;
        p.classList.toggle("is-active", active);
        p.setAttribute("aria-checked", active ? "true" : "false");
      });
    }

    function bindPillGroup(groupEl, hiddenInput, onChange) {
      groupEl.addEventListener("click", function(ev){
        var btn = ev.target.closest(".it-pill");
        if (!btn || btn.disabled) return;
        var value = btn.getAttribute("data-value") || "";
        if (!value || hiddenInput.value === value) return;
        hiddenInput.value = value;
        setPillActive(groupEl, value);
        if (onChange) onChange(value);
      });
    }

    function enforceListConcurrency(channel) {
      if (!concurrencyPills || !concurrencyEl) return;
      var canParallel = channelAllowsParallel(channel || "");
      var parallelBtn = concurrencyPills.querySelector('[data-value="parallel"]');
      if (parallelBtn) {
        parallelBtn.disabled = !canParallel;
        parallelBtn.title = canParallel ? "" : "只有 OpenRouter 和 APIMART 可以并行";
      }
      if (!canParallel && concurrencyEl.value === "parallel") {
        concurrencyEl.value = "sequential";
      }
      if (!concurrencyEl.value) concurrencyEl.value = "sequential";
      setPillActive(concurrencyPills, concurrencyEl.value);
    }

    function renderPills(groupEl, items) {
      groupEl.innerHTML = "";
      items.forEach(function(it, idx){
        var btn = document.createElement("button");
        btn.type = "button";
        btn.className = "it-pill" + (idx === 0 ? " is-active" : "");
        btn.setAttribute("role", "radio");
        btn.setAttribute("aria-checked", idx === 0 ? "true" : "false");
        btn.setAttribute("data-value", it.value);
        btn.textContent = it.label;
        groupEl.appendChild(btn);
      });
    }

    function setLanguageEmptyState(message) {
      langEl.value = "";
      promptEl.value = "";
      langPills.hidden = true;
      langPills.innerHTML = "";
      langEmpty.hidden = false;
      langEmpty.textContent = message || "暂无可用目标语言，请先在后台启用至少一个语言后再创建任务。";
      submitBtn.disabled = true;
    }

    function setLanguageOptions(items) {
      langEmpty.hidden = true;
      langEmpty.textContent = "";
      langPills.hidden = false;
      renderPills(langPills, items);
      langEl.value = items[0].value;
      submitBtn.disabled = false;
    }

    function loadPromptForCurrent(){
      var lang = langEl.value;
      if (!lang) return Promise.resolve();
      return fetch("/api/image-translate/system-prompts?lang=" + encodeURIComponent(lang),
                   {credentials:"same-origin"})
        .then(function(r){return r.json();})
        .then(function(d){
          if (d && d[presetEl.value]) {
            promptEl.value = d[presetEl.value];
          }
        });
    }

    function loadLanguages(){
      return fetch("/medias/api/languages",{credentials:"same-origin"})
        .then(function(r){return r.json();})
        .then(function(d){
          var items = (d.items || [])
            .filter(function(lang){ return lang && lang.code && lang.code !== "en"; })
            .map(function(lang){ return { value: (lang.code || "").trim(), label: (lang.name_zh || lang.code || "").trim() || lang.code }; })
            .filter(function(lang){ return !!lang.value; });
          if (!items.length) {
            setLanguageEmptyState("暂无可用目标语言，请先在后台启用至少一个语言后再创建任务。");
            return [];
          }
          setLanguageOptions(items);
          return items;
        });
    }

    function loadModels(){
      var url = "/api/image-translate/models";
      if (channelEl && channelEl.value) {
        url += "?channel=" + encodeURIComponent(channelEl.value);
      }
      return fetch(url,{credentials:"same-origin"})
        .then(function(r){return r.json();})
        .then(function(d){
          var items = (d.items || []).map(function(m){ return {value: m.id, label: m.name}; });
          renderPills(modelPills, items);
          if (d.channel && channelEl) {
            channelEl.value = d.channel;
            setPillActive(channelPills, d.channel);
            enforceListConcurrency(d.channel);
          }
          if (items.length) {
            var defaultId = (d.default_model_id || "").trim();
            var picked = defaultId && items.some(function(i){return i.value === defaultId;}) ? defaultId : items[0].value;
            modelEl.value = picked;
            setPillActive(modelPills, picked);
          }
        });
    }

    bindPillGroup(presetPills, presetEl, function(){ loadPromptForCurrent(); });
    setPillActive(presetPills, presetEl.value || "cover");
    bindPillGroup(channelPills, channelEl, function(value){ enforceListConcurrency(value); loadModels(); });
    setPillActive(channelPills, channelEl.value || "");
    enforceListConcurrency(channelEl.value || "");
    bindPillGroup(concurrencyPills, concurrencyEl, null);

    fileInput.onchange = function(){
      var chosen = Array.prototype.slice.call(fileInput.files || []);
      state.files = state.files.concat(chosen).slice(0, maxFiles);
      fileInput.value = "";
      renderThumbs();
    };

    function renderThumbs(){
      thumbsEl.innerHTML = "";
      state.files.forEach(function(f, idx){
        var wrap = document.createElement("div");
        wrap.className = "it-thumb";
        var img = document.createElement("img");
        img.src = URL.createObjectURL(f);
        var btn = document.createElement("button");
        btn.className = "it-thumb-remove"; btn.textContent = "×";
        btn.onclick = function(){ state.files.splice(idx,1); renderThumbs(); };
        wrap.appendChild(img); wrap.appendChild(btn);
        thumbsEl.appendChild(wrap);
      });
      hintEl.textContent = "已选 " + state.files.length + " 张，最多 " + maxFiles + " 张";
    }

    submitBtn.onclick = async function(){
      clearError();
      var productName = (productNameEl && productNameEl.value || "").trim();
      if (!productName) {
        if (productNameEl) {
          productNameEl.focus();
          if (typeof productNameEl.scrollIntoView === "function") {
            productNameEl.scrollIntoView({ behavior: "smooth", block: "center" });
          }
        }
        return showError("请先输入产品名，再提交任务");
      }
      if (productName.length > 60) return showError("产品名长度不能超过 60 字符");
      if (!state.files.length) return showError("请选择图片");
      if (!langEl.value) return showError("请选择目标语言");
      if (!modelEl.value) return showError("请选择模型");
      if (!promptEl.value.trim()) return showError("prompt 不能为空");
      enforceListConcurrency(channelEl.value || "");

      submitBtn.disabled = true;
      submitBtn.textContent = "申请上传地址...";
      try {
        var bootstrap = await fetch("/api/image-translate/upload/bootstrap",{
          method:"POST", credentials:"same-origin",
          headers:{"Content-Type":"application/json"},
          body: JSON.stringify({
            count: state.files.length,
            files: state.files.map(function(f){
              return {filename: f.name, size: f.size, content_type: f.type || "application/octet-stream"};
            }),
          }),
        }).then(r => r.json().then(d => { if(!r.ok) throw new Error(d.error||"bootstrap failed"); return d; }));

        for (var i=0; i<state.files.length; i++){
          submitBtn.textContent = "上传 " + (i+1) + "/" + state.files.length + "...";
          var up = bootstrap.uploads[i];
          var res = await fetch(up.upload_url, {method:"PUT", body: state.files[i]});
          if (!res.ok) throw new Error("直传失败 " + (i+1));
        }

        submitBtn.textContent = "创建任务中...";
        var complete = await fetch("/api/image-translate/upload/complete",{
          method:"POST", credentials:"same-origin",
          headers:{"Content-Type":"application/json"},
          body: JSON.stringify({
            task_id: bootstrap.task_id,
            product_name: productName,
            preset: presetEl.value,
            target_language: langEl.value,
            "channel": channelEl.value,
            model_id: modelEl.value,
            prompt: promptEl.value,
            concurrency_mode: concurrencyEl.value,
            uploaded: bootstrap.uploads.map(function(u,idx){
              return {idx: u.idx, object_key: u.object_key, filename: state.files[idx].name, size: state.files[idx].size};
            }),
          }),
        }).then(r => r.json().then(d => { if(!r.ok) throw new Error(d.error||"complete failed"); return d; }));

        location.href = "/image-translate/" + encodeURIComponent(complete.task_id || "");
      } catch (e) {
        showError(e.message || "提交失败");
        submitBtn.disabled = false;
        submitBtn.textContent = "提交任务";
      }
    };

    loadLanguages().then(function(items){
      if (!items.length) return;
      bindPillGroup(langPills, langEl, function(){ loadPromptForCurrent(); });
      loadPromptForCurrent();
    });
    loadModels().then(function(){
      bindPillGroup(modelPills, modelEl, null);
    });

    var historyTable = document.getElementById("itHistoryTable");
    if (historyTable) {
      historyTable.addEventListener("click", function(ev){
        var retryBtn = ev.target.closest("button.it-list-retry");
        var row = ev.target.closest("tr[data-task-id]");
        if (!row) return;
        var historyTaskId = row.getAttribute("data-task-id") || "";
        if (!historyTaskId) return;
        if (retryBtn) {
          ev.stopPropagation();
          ev.preventDefault();
          if (retryBtn.disabled) return;
          retryBtn.disabled = true;
          var original = retryBtn.textContent;
          retryBtn.textContent = "提交中...";
          fetch("/api/image-translate/" + encodeURIComponent(historyTaskId) + "/retry-unfinished",
                {method:"POST", credentials:"same-origin"})
            .then(parseJsonResponse)
            .then(function(res){
              if (!res.ok) {
                alert((res.body && res.body.error) || "重新生成失败");
                retryBtn.disabled = false;
                retryBtn.textContent = original;
                return;
              }
              location.href = "/image-translate/" + encodeURIComponent(historyTaskId);
            })
            .catch(function(){
              alert("网络错误，稍后再试");
              retryBtn.disabled = false;
              retryBtn.textContent = original;
            });
          return;
        }
        location.href = "/image-translate/" + encodeURIComponent(historyTaskId);
      });
    }
    return;
  }

  if (pageType === "image-translate-detail") {
    var taskId = pageEl.getAttribute("data-task-id");
    var listEl = document.getElementById("itItemList");
    var progressText = document.getElementById("itProgressText");
    var progressFill = document.getElementById("itProgressFill");
    var zipBtn = document.getElementById("itZipDownload");
    var delBtn = document.getElementById("itDelete");
    var retryUnfinishedBtn = document.getElementById("itRetryUnfinished");
    var backfillImagesBtn = document.getElementById("itBackfillImages");
    var rerunBtn = document.getElementById("itRerunChannel");
    var rerunModal = document.getElementById("itChannelRerunModal");
    var rerunChannelPills = document.getElementById("itRerunChannelPills");
    var rerunModelPills = document.getElementById("itRerunModelPills");
    var rerunConcurrencyPills = document.getElementById("itRerunConcurrencyPills");
    var rerunChannelValue = document.getElementById("itRerunChannelValue");
    var rerunModelValue = document.getElementById("itRerunModelValue");
    var rerunConcurrencyValue = document.getElementById("itRerunConcurrencyValue");
    var rerunSubmit = document.getElementById("itRerunSubmit");
    var rerunError = document.getElementById("itRerunError");
    var currentState = window.imageTranslateBootstrap || {};

    function textDetectBadge(it){
      var status = it.text_detect_status || "pending";
      var hasText = it.text_detect_has_text;
      var label = "文字判断：等待检测";
      var tone = "pending";
      if (status === "running") {
        label = "文字判断：检测中";
        tone = "running";
      } else if (status === "error") {
        label = "文字判断：检测失败，按有文字处理";
        tone = "warning";
      } else if (hasText === true) {
        label = "文字判断：有文字";
        tone = "yes";
      } else if (hasText === false) {
        label = "文字判断：无文字";
        tone = "no";
      }
      return {label: label, tone: tone, title: it.text_detect_reason || it.text_detect_error || ""};
    }

    function resultSourceBadge(it){
      var source = it.result_source || "";
      if (source === "copied_source") {
        return {label: "结果来源：复制原图", tone: "copy"};
      }
      if (source === "banana_regenerate") {
        return {label: "结果来源：banana重新生成", tone: "translate"};
      }
      if (source === "image_translate" || (it.status === "done" && it.dst_tos_key)) {
        return {label: "结果来源：图片翻译", tone: "translate"};
      }
      return {label: "结果来源：待生成", tone: "pending"};
    }

    function imageTranslateChannelLabel(channel, state){
      var key = (channel || "").trim().toLowerCase();
      if (!key) return "";
      var channels = window.imageTranslateChannels || [];
      for (var i = 0; i < channels.length; i++) {
        if ((channels[i].id || "").toLowerCase() === key) {
          return channels[i].name || key;
        }
      }
      if (state && (state.channel || "").toLowerCase() === key && state.channel_label) {
        return state.channel_label;
      }
      return key;
    }

    function taskModelOriginValid(state){
      return !(state && state.model_origin_valid === false);
    }

    function resultModelBadge(it, state){
      var source = it.result_source || "";
      if (source === "copied_source") return null;
      var isDone = it.status === "done" && !!it.dst_tos_key;
      var channel = (it.result_channel || "").trim();
      var modelId = (it.result_model_id || "").trim();
      if (source === "banana_regenerate") {
        channel = channel || "aistudio";
        modelId = modelId || "gemini-3.1-flash-image-preview";
      }
      if (isDone && taskModelOriginValid(state)) {
        channel = channel || ((state && state.channel) || "");
        modelId = modelId || ((state && state.model_id) || "");
      }
      if (!channel && !modelId) {
        return null;
      }
      var provider = imageTranslateChannelLabel(channel, state);
      var parts = [];
      if (provider) parts.push("供应商：" + provider);
      if (modelId) parts.push("模型ID：" + modelId);
      return {label: "大模型：" + parts.join("；"), tone: "translate", title: parts.join("\n")};
    }

    function appendBadge(meta, badge, classBase){
      if (!badge) return;
      var el = document.createElement("span");
      el.className = classBase + " is-" + badge.tone;
      el.textContent = badge.label;
      if (badge.title) el.title = badge.title;
      meta.appendChild(el);
    }

    function appendItemMeta(container, it, state){
      var primaryMeta = document.createElement("div");
      primaryMeta.className = "it-item-meta it-item-meta--primary";
      appendBadge(primaryMeta, textDetectBadge(it), "it-meta-chip it-meta-chip--detect");
      appendBadge(primaryMeta, resultSourceBadge(it), "it-meta-chip it-meta-chip--source");
      container.appendChild(primaryMeta);

      var modelMeta = document.createElement("div");
      modelMeta.className = "it-item-meta it-item-model-meta";
      appendBadge(modelMeta, resultModelBadge(it, state), "it-meta-chip it-meta-chip--model");
      if (modelMeta.children.length) container.appendChild(modelMeta);
    }

    function setRerunError(message){
      if (!rerunError) return;
      rerunError.textContent = message || "";
      rerunError.hidden = !message;
    }

    function setRerunPillActive(groupEl, value){
      if (!groupEl) return;
      groupEl.querySelectorAll(".it-pill").forEach(function(btn){
        var active = btn.getAttribute("data-value") === value;
        btn.classList.toggle("is-active", active);
        btn.setAttribute("aria-checked", active ? "true" : "false");
      });
    }

    function renderRerunPills(groupEl, items, selectedValue){
      if (!groupEl) return;
      groupEl.innerHTML = "";
      (items || []).forEach(function(item, idx){
        var value = item.id || item.value || "";
        var label = item.name || item.label || value;
        var selected = value === selectedValue || (!selectedValue && idx === 0);
        var btn = document.createElement("button");
        btn.type = "button";
        btn.className = "it-pill" + (selected ? " is-active" : "");
        btn.setAttribute("role", "radio");
        btn.setAttribute("aria-checked", selected ? "true" : "false");
        btn.setAttribute("data-value", value);
        btn.textContent = label;
        groupEl.appendChild(btn);
      });
    }

    function bindRerunPillGroup(groupEl, hiddenInput, onChange){
      if (!groupEl || !hiddenInput) return;
      groupEl.addEventListener("click", function(ev){
        var btn = ev.target.closest(".it-pill");
        if (!btn || btn.disabled) return;
        var value = btn.getAttribute("data-value") || "";
        if (!value || hiddenInput.value === value) return;
        hiddenInput.value = value;
        setRerunPillActive(groupEl, value);
        if (onChange) onChange(value);
      });
    }

    function enforceRerunConcurrency(channel){
      if (!rerunConcurrencyPills || !rerunConcurrencyValue) return;
      var parallelBtn = rerunConcurrencyPills.querySelector('[data-value="parallel"]');
      var canParallel = channelAllowsParallel(channel || "");
      if (parallelBtn) {
        parallelBtn.disabled = !canParallel;
        parallelBtn.title = canParallel ? "" : "只有 OpenRouter 和 APIMART 可以并行";
      }
      if (!canParallel && rerunConcurrencyValue.value === "parallel") {
        rerunConcurrencyValue.value = "sequential";
      }
      if (!rerunConcurrencyValue.value) rerunConcurrencyValue.value = "sequential";
      setRerunPillActive(rerunConcurrencyPills, rerunConcurrencyValue.value);
    }

    function loadRerunModels(){
      if (!rerunChannelValue || !rerunModelPills || !rerunModelValue) return Promise.resolve();
      var channel = rerunChannelValue.value || "";
      if (rerunSubmit) rerunSubmit.disabled = true;
      setRerunError("");
      return fetch("/api/image-translate/models?channel=" + encodeURIComponent(channel), {credentials:"same-origin"})
        .then(parseJsonResponse)
        .then(function(res){
          if (!res.ok) {
            renderRerunPills(rerunModelPills, [], "");
            rerunModelValue.value = "";
            setRerunError((res.body && res.body.error) || "模型列表加载失败");
            return;
          }
          var body = res.body || {};
          var models = body.items || [];
          var currentModel = (currentState && currentState.model_id) || "";
          var selected = models.some(function(item){ return item.id === currentModel; })
            ? currentModel
            : (body.default_model_id || (models[0] && models[0].id) || "");
          rerunModelValue.value = selected;
          renderRerunPills(rerunModelPills, models, selected);
        })
        .catch(function(){
          renderRerunPills(rerunModelPills, [], "");
          rerunModelValue.value = "";
          setRerunError("模型列表加载失败");
        })
        .finally(function(){
          if (rerunSubmit) rerunSubmit.disabled = !rerunModelValue.value;
        });
    }

    function openRerunModal(){
      if (!rerunModal) return;
      currentState = currentState || window.imageTranslateBootstrap || {};
      var channel = currentState.channel || "apimart";
      var mode = currentState.concurrency_mode || "sequential";
      rerunChannelValue.value = channel;
      rerunModelValue.value = currentState.model_id || "";
      rerunConcurrencyValue.value = mode;
      renderRerunPills(rerunChannelPills, window.imageTranslateChannels || [], channel);
      enforceRerunConcurrency(channel);
      setRerunError("");
      rerunModal.hidden = false;
      loadRerunModels();
    }

    function closeRerunModal(){
      if (rerunModal) rerunModal.hidden = true;
    }

    function submitRerunWithChannel(){
      if (!rerunSubmit) return;
      var channel = rerunChannelValue.value || "";
      enforceRerunConcurrency(channel);
      var payload = {
        channel: channel,
        model_id: rerunModelValue.value || "",
        concurrency_mode: rerunConcurrencyValue.value || "sequential"
      };
      rerunSubmit.disabled = true;
      fetch("/api/image-translate/" + taskId + "/rerun-unfinished", {
        method:"POST",
        credentials:"same-origin",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify(payload)
      })
        .then(parseJsonResponse)
        .then(function(res){
          if (!res.ok) {
            setRerunError((res.body && res.body.error) || "换通道重跑失败");
            rerunSubmit.disabled = false;
            return;
          }
          closeRerunModal();
          refresh();
        })
        .catch(function(){
          setRerunError("网络错误，稍后再试");
          rerunSubmit.disabled = false;
        });
    }

    function renderItems(state){
      listEl.innerHTML = "";
      var isRunning = state.is_running === true;
      (state.items || []).forEach(function(it){
        var row = document.createElement("div");
        row.className = "it-item";
        var leftPane = document.createElement("div");
        leftPane.className = "it-item-pane";
        var left = document.createElement("img");
        left.src = "/api/image-translate/"+taskId+"/artifact/source/"+it.idx;
        leftPane.appendChild(left);
        var leftCaption = document.createElement("div");
        leftCaption.className = "it-item-caption";
        leftCaption.textContent = "原图";
        leftPane.appendChild(leftCaption);
        row.appendChild(leftPane);
        var right = document.createElement("div");
        right.className = "it-item-pane";
        if (it.status === "done") {
          var imgOut = document.createElement("img");
          imgOut.src = "/api/image-translate/"+taskId+"/artifact/result/"+it.idx + "?t=" + Date.now();
          right.appendChild(imgOut);
          var rightCaption = document.createElement("div");
          rightCaption.className = "it-item-caption";
          rightCaption.textContent = "结果图";
          right.appendChild(rightCaption);
        } else {
          var statusBox = document.createElement("div");
          statusBox.className = "it-item-status";
          statusBox.textContent = "状态：" + (it.status || "pending") + (it.error ? "；错误：" + it.error : "");
          right.appendChild(statusBox);
        }
        appendItemMeta(right, it, state);
        row.appendChild(right);
        var actions = document.createElement("div");
        actions.className = "it-item-actions";
        if (it.status === "done") {
          var a = document.createElement("a");
          a.className = "btn"; a.href = "/api/image-translate/"+taskId+"/download/result/"+it.idx;
          a.textContent = "下载"; actions.appendChild(a);
        }
        var retryBtn = document.createElement("button");
        retryBtn.className = "btn it-retry-item";
        retryBtn.type = "button";
        retryBtn.textContent = it.status === "done" ? "重新生成" : "重试";
        retryBtn.disabled = isRunning;
        retryBtn.title = isRunning ? "任务正在跑，等跑完再重试" : "";
        retryBtn.onclick = (function(i){ return function(){ retry(i); }; })(it.idx);
        actions.appendChild(retryBtn);
        if (it.status === "done" || it.status === "failed") {
          var bananaBtn = document.createElement("button");
          bananaBtn.className = "btn it-retry-item it-banana-retry-item";
          bananaBtn.type = "button";
          bananaBtn.textContent = "banana重新生成";
          bananaBtn.disabled = isRunning;
          bananaBtn.title = isRunning ? "任务正在跑，等跑完再重试" : "使用 Google ADC 的 Nano Banana 2 重新生成";
          bananaBtn.onclick = (function(i){ return function(){ bananaRetry(i); }; })(it.idx);
          actions.appendChild(bananaBtn);
        }
        if (it.status === "done" || it.status === "failed") {
          var sourceBtn = document.createElement("button");
          sourceBtn.className = "btn it-retry-item it-use-source-item";
          sourceBtn.type = "button";
          sourceBtn.textContent = "使用原图";
          sourceBtn.disabled = isRunning;
          sourceBtn.title = isRunning ? "任务正在跑，等跑完再使用原图" : "直接复制原图为结果图";
          sourceBtn.onclick = (function(i){ return function(){ useSource(i); }; })(it.idx);
          actions.appendChild(sourceBtn);
        }
        row.appendChild(actions);
        listEl.appendChild(row);
      });
    }

    function renderProgress(state){
      var p = state.progress || {total:0, done:0, failed:0};
      progressText.textContent = p.done + " / " + p.total + " 完成，" + p.failed + " 失败";
      var pct = p.total ? Math.round((p.done + p.failed) / p.total * 100) : 0;
      progressFill.style.width = pct + "%";
      var isInterrupted = (state.status || "") === "interrupted";
      var banner = document.getElementById("itInterruptedBanner");
      if (banner) banner.hidden = !isInterrupted;
      if (retryUnfinishedBtn) {
        var total = p.total || 0;
        var done = p.done || 0;
        var isRunning = state.is_running === true;
        var showBtn = total > 0 && done < total;
        retryUnfinishedBtn.hidden = !showBtn;
        retryUnfinishedBtn.disabled = isRunning;
        retryUnfinishedBtn.title = isRunning ? "任务正在跑，等跑完再重试" : "";
        retryUnfinishedBtn.textContent = isInterrupted ? "恢复中断的任务" : "重试未完成的图片";
      }
      if (backfillImagesBtn) {
        var ctx = (state && state.medias_context) || {};
        var showBackfill = (ctx.entry || "") === "medias_edit_detail";
        backfillImagesBtn.hidden = !showBackfill;
        backfillImagesBtn.disabled = state.is_running === true;
        backfillImagesBtn.title = state.is_running === true
          ? "任务正在跑，等跑完再回填"
          : "成功项回填结果图，失败项先使用原图再回填";
      }
    }

    function describeMediasApplyStatus(ctx){
      if (!ctx || !ctx.auto_apply_detail_images) return "未启用自动回填";
      if (ctx.apply_status === "applied") return "已回填到当前语种详情图";
      if (ctx.apply_status === "skipped_failed") return "任务未全部成功，未回填";
      if (ctx.apply_status === "apply_error") {
        return "回填失败" + (ctx.last_apply_error ? "：" + ctx.last_apply_error : "");
      }
      return "等待任务完成后自动回填";
    }

    window.renderImageTranslateMediasContext = function renderImageTranslateMediasContext(state){
      var ctx = (state && state.medias_context) || {};
      var card = document.getElementById("itMediasContextCard");
      if (!card) return;
      if ((ctx.entry || "") !== "medias_edit_detail") {
        card.hidden = true;
        return;
      }
      card.hidden = false;
      var productName = (state && state.product_name) || "";
      var productId = ctx.product_id ? ("#" + ctx.product_id) : "";
      var productLabel = productName || productId || "-";
      if (productName && productId) productLabel = productName + " (" + productId + ")";
      document.getElementById("itMediasEntry").textContent = "商品素材编辑页";
      document.getElementById("itMediasProductName").textContent = productLabel;
      document.getElementById("itMediasTargetLang").textContent =
        (state && state.target_language_name) || (state && state.target_language) || ctx.target_lang || "-";
      document.getElementById("itMediasApplyStatus").textContent = describeMediasApplyStatus(ctx);
    };

    function renderTaskMeta(state){
      if (!state) return;
      var modelEl = document.getElementById("itMetaModel");
      if (modelEl) {
        var modelText = state.model_id || "";
        if (modelText && state.model_origin_valid === false) {
          modelText = "";
        }
        modelEl.title = "";
        modelEl.textContent = modelText;
      }
      var modeEl = document.getElementById("itMetaConcurrencyMode");
      if (modeEl) {
        var mode = state.concurrency_mode || "sequential";
        modeEl.textContent = state.concurrency_mode_label || (mode === "parallel" ? "并行" : "串行");
        modeEl.setAttribute("data-concurrency-mode", mode);
        modeEl.className = "it-pill it-mode-pill is-active is-" + mode;
      }
      var channelEl = document.getElementById("itMetaChannel");
      if (channelEl) {
        var channel = state.channel || "";
        channelEl.textContent = state.channel_label || channel;
        channelEl.className = "chip chip--backend is-" + channel;
      }
      if (rerunBtn) {
        rerunBtn.disabled = state.is_running === true;
        rerunBtn.title = state.is_running === true ? "任务正在跑，等跑完再换通道重跑" : "";
      }
    }

    function renderAll(state){
      currentState = state || currentState || {};
      renderTaskMeta(currentState);
      window.renderImageTranslateMediasContext(currentState);
      renderItems(currentState);
      renderProgress(currentState);
    }

    function refresh(){
      return fetch("/api/image-translate/"+taskId,{credentials:"same-origin"})
        .then(function(r){return r.json();})
        .then(renderAll);
    }

    function retry(idx){
      fetch("/api/image-translate/"+taskId+"/retry/"+idx,{method:"POST",credentials:"same-origin"})
        .then(parseJsonResponse)
        .then(function(res){
          if (!res.ok) { alert(res.body && res.body.error || "重试失败"); return; }
          refresh();
        })
        .catch(function(){ alert("网络错误，稍后再试"); });
    }

    function bananaRetry(idx){
      fetch("/api/image-translate/"+taskId+"/banana-retry/"+idx,{method:"POST",credentials:"same-origin"})
        .then(parseJsonResponse)
        .then(function(res){
          if (!res.ok) { alert(res.body && res.body.error || "banana重新生成失败"); return; }
          refresh();
        })
        .catch(function(){ alert("网络错误，稍后再试"); });
    }

    function useSource(idx){
      fetch("/api/image-translate/"+taskId+"/use-source/"+idx,{method:"POST",credentials:"same-origin"})
        .then(parseJsonResponse)
        .then(function(res){
          if (!res.ok) { alert(res.body && res.body.error || "使用原图失败"); return; }
          refresh();
        })
        .catch(function(){ alert("网络错误，稍后再试"); });
    }

    bindRerunPillGroup(rerunChannelPills, rerunChannelValue, function(channel){
      enforceRerunConcurrency(channel);
      loadRerunModels();
    });
    bindRerunPillGroup(rerunModelPills, rerunModelValue);
    bindRerunPillGroup(rerunConcurrencyPills, rerunConcurrencyValue, function(){
      enforceRerunConcurrency(rerunChannelValue && rerunChannelValue.value);
    });
    if (rerunBtn) rerunBtn.onclick = openRerunModal;
    if (rerunSubmit) rerunSubmit.onclick = submitRerunWithChannel;
    if (rerunModal) {
      rerunModal.querySelectorAll("[data-rerun-close]").forEach(function(el){
        el.addEventListener("click", closeRerunModal);
      });
    }

    if (backfillImagesBtn) {
      backfillImagesBtn.onclick = function(){
        if (!confirm("将把成功图片回填到商品详情图；失败或未完成图片会先使用原图作为结果图再回填。确定继续吗？")) return;
        backfillImagesBtn.disabled = true;
        var original = backfillImagesBtn.textContent;
        backfillImagesBtn.textContent = "回填中...";
        fetch("/api/image-translate/"+taskId+"/backfill-images",{method:"POST",credentials:"same-origin"})
          .then(parseJsonResponse)
          .then(function(res){
            if (!res.ok) {
              alert(res.body && res.body.error || "回填失败");
              backfillImagesBtn.disabled = false;
              backfillImagesBtn.textContent = original;
              return;
            }
            var body = res.body || {};
            alert("回填完成：" + (body.applied || 0) + " 张，原图兜底 " + (body.fallback_source_count || 0) + " 张");
            backfillImagesBtn.textContent = original;
            refresh();
          })
          .catch(function(){
            alert("网络错误，稍后再试");
            backfillImagesBtn.disabled = false;
            backfillImagesBtn.textContent = original;
          });
      };
    }

    if (retryUnfinishedBtn) {
      retryUnfinishedBtn.onclick = function(){
        retryUnfinishedBtn.disabled = true;
        fetch("/api/image-translate/"+taskId+"/retry-unfinished",{method:"POST",credentials:"same-origin"})
          .then(parseJsonResponse)
          .then(function(res){
            if (!res.ok) { alert(res.body && res.body.error || "重试失败"); retryUnfinishedBtn.disabled = false; return; }
            refresh();
          })
          .catch(function(){ retryUnfinishedBtn.disabled = false; });
      };
    }

    zipBtn.onclick = function(){
      location.href = "/api/image-translate/"+taskId+"/download/zip";
    };
    delBtn.onclick = function(){
      if (!confirm("确认删除该任务？")) return;
      fetch("/api/image-translate/"+taskId,{method:"DELETE"})
        .then(function(r){ if (r.status === 204) location.href = "/image-translate"; });
    };

    if (window.io) {
      var socket = window.io();
      var join = function(){ socket.emit("join_image_translate_task", {task_id: taskId}); };
      join();
      socket.on("connect", join);
      socket.on("image_translate:item_updated", function(){ refresh(); });
      socket.on("image_translate:progress", function(){ refresh(); });
      socket.on("image_translate:task_done", function(){ refresh(); });
    }

    renderAll(window.imageTranslateBootstrap || {});
    refresh();
    return;
  }
})();
</script>
