<script>
  const socket = io();
  const STEP_ORDER = ["extract", "asr", "alignment", "translate", "tts", "subtitle", "compose", "export"];
  const stepIcons = { pending: "·", waiting: "!", done: "✓", error: "×" };
  const TASK_WORKBENCH_CONFIG = {
    taskId: {{ task_id|tojson }},
    initialTask: {{ initial_task|tojson }},
    allowUpload: {{ 'true' if allow_upload else 'false' }},
    detailUrlTemplate: {{ (url_for_detail|default(url_for('projects.detail', task_id='__TASK_ID__')))|tojson }},
    apiBase: {{ (api_base|default('/api/tasks'))|tojson }},
  };

  let taskId = TASK_WORKBENCH_CONFIG.taskId;
  function _apiUrl(path) { return `${TASK_WORKBENCH_CONFIG.apiBase}/${taskId}${path || ''}`; }
  let currentTask = TASK_WORKBENCH_CONFIG.initialTask;
  const _userTranslatePref = {{ (translate_pref or 'openrouter')|tojson }};
  let refreshTimer = null;
  let activeRefreshLoop = null;
  let startRequestInFlight = false;
  const START_BUTTON_DEFAULT_LABEL = "开始处理";
  const START_BUTTON_LOADING_LABEL = "加载视频中...";

  const uploadZone = document.getElementById("uploadZone");
  const fileInput = document.getElementById("fileInput");

  if (uploadZone && fileInput) {
    uploadZone.addEventListener("click", () => fileInput.click());
    uploadZone.addEventListener("dragover", e => { e.preventDefault(); uploadZone.classList.add("drag-over"); });
    uploadZone.addEventListener("dragleave", () => uploadZone.classList.remove("drag-over"));
    uploadZone.addEventListener("drop", e => {
      e.preventDefault();
      uploadZone.classList.remove("drag-over");
      if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener("change", () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });
  }

  let _voicesCache = [];
  let _selectedVoiceId = null;
  let _playingAudio = null;
  let _previewAudio = null;
  let _previewAudioGid = null;

  bootVoices();
  renderStepPreviews({});
  bootInitialTask();

  async function bootVoices() {
    try {
      const res = await fetch("/api/voices");
      if (!res.ok) {
        console.error("bootVoices: HTTP", res.status, res.statusText);
        document.getElementById("voiceList").innerHTML = '<div class="voice-list-empty">音色列表加载失败 (HTTP ' + res.status + ')</div>';
        return;
      }
      const data = await res.json();
      _voicesCache = data.voices || [];
      // Auto-select user's default voice (or first voice) if nothing selected yet
      if (!_selectedVoiceId && _voicesCache.length) {
        const defaultV = _voicesCache.find(v => v.is_default);
        _selectedVoiceId = defaultV ? defaultV.id : _voicesCache[0].id;
      }
      renderVoiceList();
      applyTaskConfigToForm();
    } catch (err) {
      console.error("bootVoices error:", err);
      document.getElementById("voiceList").innerHTML = '<div class="voice-list-empty">音色列表加载失败</div>';
    }
  }

  function renderVoiceList() {
    const list = document.getElementById("voiceList");
    if (!_voicesCache.length) {
      list.innerHTML = '<div class="voice-list-empty">暂无音色，点击右上角导入</div>';
      return;
    }
    list.innerHTML = _voicesCache.map(voice => `
      <div class="voice-item ${_selectedVoiceId == voice.id ? 'selected' : ''}"
           data-voice-id="${voice.id}" onclick="selectVoice(${voice.id})">
        <div class="voice-item-info">
          <div class="voice-item-name">${escapeHtml(voice.name)}</div>
          <div class="voice-item-desc">${escapeHtml(voice.description || '')}</div>
        </div>
        <span class="voice-item-gender ${voice.gender}">${voice.gender === 'female' ? '女声' : '男声'}</span>
        <button class="voice-default-btn ${voice.is_default ? 'active' : ''}" onclick="setDefaultVoice(event, ${voice.id})">默认</button>
        <button class="voice-play-btn ${voice.preview_url ? '' : 'disabled'}" ${voice.preview_url ? `onclick="playVoicePreview(event, '${escapeJs(voice.preview_url)}', this)"` : 'disabled'} title="试听">&#9654;</button>
      </div>
    `).join("");
  }

  function selectVoice(voiceId) {
    _selectedVoiceId = voiceId;
    renderVoiceList();
  }

  async function setDefaultVoice(e, voiceId) {
    e.stopPropagation();
    try {
      const res = await fetch(`/api/voices/${voiceId}/set-default`, { method: "POST" });
      if (!res.ok) return;
      _voicesCache.forEach(v => v.is_default = (v.id === voiceId));
      renderVoiceList();
    } catch {}
  }

  function playVoicePreview(e, url, btn) {
    e.stopPropagation();
    const audio = document.getElementById("voicePreviewAudio");
    if (_playingAudio === url && !audio.paused) {
      audio.pause();
      btn.classList.remove("playing");
      btn.innerHTML = "&#9654;";
      _playingAudio = null;
      return;
    }
    document.querySelectorAll(".voice-play-btn.playing").forEach(b => {
      b.classList.remove("playing");
      b.innerHTML = "&#9654;";
    });
    audio.src = url;
    audio.play().catch(() => {});
    btn.classList.add("playing");
    btn.innerHTML = "&#9646;&#9646;";
    _playingAudio = url;
    audio.onended = () => {
      btn.classList.remove("playing");
      btn.innerHTML = "&#9654;";
      _playingAudio = null;
    };
  }

  document.getElementById("voiceImportBtn").addEventListener("click", () => {
    document.getElementById("voiceImportOverlay").classList.remove("hidden");
    document.getElementById("importVoiceSource").value = "";
    document.getElementById("importVoiceName").value = "";
    document.getElementById("importVoiceGender").value = "";
    document.getElementById("importVoiceError").classList.add("hidden");
    document.getElementById("importPreviewSection").classList.add("hidden");
    document.getElementById("importVoiceSource").focus();
  });

  document.getElementById("importVoiceCancel").addEventListener("click", () => {
    document.getElementById("voiceImportOverlay").classList.add("hidden");
  });

  document.getElementById("voiceImportOverlay").addEventListener("click", (e) => {
    if (e.target === e.currentTarget) document.getElementById("voiceImportOverlay").classList.add("hidden");
  });

  document.getElementById("importVoiceSubmit").addEventListener("click", async () => {
    const source = document.getElementById("importVoiceSource").value.trim();
    if (!source) { showImportError("请输入 voiceId 或 ElevenLabs 链接"); return; }
    const errEl = document.getElementById("importVoiceError");
    errEl.classList.add("hidden");
    const submitBtn = document.getElementById("importVoiceSubmit");
    submitBtn.disabled = true;
    submitBtn.textContent = "导入中...";
    const body = { source };
    const name = document.getElementById("importVoiceName").value.trim();
    const gender = document.getElementById("importVoiceGender").value;
    if (name) body.name = name;
    if (gender) body.gender = gender;
    try {
      const res = await fetch("/api/voices/import", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (!res.ok) { showImportError(data.error || "导入失败"); return; }
      _voicesCache.push(data.voice);
      _selectedVoiceId = data.voice.id;
      renderVoiceList();
      document.getElementById("voiceImportOverlay").classList.add("hidden");
    } catch (err) {
      showImportError(err.message || "网络错误");
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = "导入";
    }
  });

  function showImportError(msg) {
    const el = document.getElementById("importVoiceError");
    el.textContent = msg;
    el.classList.remove("hidden");
  }

  function bootInitialTask() {
    if (!currentTask || !taskId) return;
    showTaskWorkbench();
    renderTaskHero();
    renderTaskState();
    restoreReviewState();
    socket.emit("join_task", { task_id: taskId });
  }

  function showTaskWorkbench() {
    document.getElementById("voicePanel").classList.remove("hidden");
    document.getElementById("configPanel").classList.remove("hidden");
    document.getElementById("pipelineCard").classList.remove("hidden");
    const hero = document.getElementById("taskHero");
    if (hero) hero.classList.remove("hidden");
  }

  function setStartButtonBusy(isBusy, label = START_BUTTON_DEFAULT_LABEL) {
    const startBtn = document.getElementById("startBtn");
    if (!startBtn) return;
    startBtn.disabled = Boolean(isBusy);
    startBtn.textContent = label;
  }

  function resetStartButton() {
    setStartButtonBusy(false, START_BUTTON_DEFAULT_LABEL);
  }

  function applyTaskConfigToForm() {
    if (!currentTask) return;
    _selectedVoiceId = currentTask.voice_id || null;
    renderVoiceList();
    document.getElementById("subtitlePosition").value = currentTask.subtitle_position || "bottom";
    document.getElementById("interactiveReviewToggle").value = String(Boolean(currentTask.interactive_review));
  }

  function renderTaskHero() {
    if (!currentTask) return;
    const title = currentTask.original_filename || currentTask.id || taskId;
    const statuses = {
      uploaded: "上传完成，可以开始处理",
      done: "处理完成，所有中间产物都保留在页面里",
      error: "任务执行失败，可以查看已生成的中间产物",
    };
    const message = statuses[currentTask.status] || statusSummary(currentTask);
    document.getElementById("taskHeroTitle").textContent = title;
    document.getElementById("taskHeroStatus").textContent = message;
  }

  function statusSummary(task) {
    const waitingStep = STEP_ORDER.find(step => task.steps?.[step] === "waiting");
    if (waitingStep) return `等待确认：${stepLabel(waitingStep)}`;
    const runningStep = STEP_ORDER.find(step => task.steps?.[step] === "running");
    if (runningStep) return `处理中：${stepLabel(runningStep)}`;
    return "上传完成，可以开始处理";
  }

  function stepLabel(step) {
    return {
      extract: "音频提取",
      asr: "语音识别",
      alignment: "分段确认",
      translate: "翻译本土化",
      tts: "语音生成",
      subtitle: "字幕生成",
      compose: "视频合成",
      export: "CapCut 导出",
    }[step] || step;
  }

  function handleFile(file) {
    clearError();
    if (uploadZone) {
      uploadZone.innerHTML = `
        <div class="icon">⏳</div>
        <strong>上传中：${escapeHtml(file.name)}</strong>
        <p>${(file.size / 1024 / 1024).toFixed(1)} MB</p>
        <div class="progress-bar-container" style="width: 100%; max-width: 300px; height: 6px; background: var(--border-main); border-radius: 999px; margin: 12px auto 0; overflow: hidden;">
          <div id="uploadProgress" style="width: 0%; height: 100%; background: var(--primary-gradient); transition: width 0.1s linear;"></div>
        </div>
        <p id="uploadPercent" style="margin-top: 8px; font-weight: 600; color: var(--primary-color);">0%</p>
      `;
    }
    fetch("/api/tos-upload/bootstrap", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        original_filename: file.name,
        file_size: file.size,
        content_type: file.type || "application/octet-stream",
      }),
    }).then(async bootstrapRes => {
      const bootstrap = await bootstrapRes.json();
      if (!bootstrapRes.ok) throw new Error(bootstrap.error || "上传初始化失败");

      const xhr = new XMLHttpRequest();
      xhr.open("PUT", bootstrap.upload_url, true);

      xhr.upload.onprogress = function(event) {
        if (event.lengthComputable) {
          const percent = Math.round((event.loaded / event.total) * 100);
          const progressEl = document.getElementById("uploadProgress");
          const percentEl = document.getElementById("uploadPercent");
          if (progressEl) progressEl.style.width = percent + "%";
          if (percentEl) percentEl.textContent = percent + "%";
        }
      };

      xhr.onload = async function() {
        if (xhr.status < 200 || xhr.status >= 300) {
          showError("视频上传到 TOS 失败");
          return;
        }
        try {
          const completeRes = await fetch("/api/tos-upload/complete", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              task_id: bootstrap.task_id,
              object_key: bootstrap.object_key,
              original_filename: file.name,
              file_size: file.size,
              content_type: file.type || "application/octet-stream",
            }),
          });
          const data = await completeRes.json();
          if (!completeRes.ok) throw new Error(data.error || "创建任务失败");
          window.location.href = TASK_WORKBENCH_CONFIG.detailUrlTemplate.replace("__TASK_ID__", data.task_id);
        } catch (err) {
          showError(err.message || "创建任务失败");
        }
      };

      xhr.onerror = function() {
        showError("网络或系统异常，上传失败");
      };

      xhr.send(file);
    }).catch(err => {
      showError(err.message || "上传失败");
    });
  }

  document.getElementById("startBtn").addEventListener("click", async () => {
    if (!taskId || startRequestInFlight) return;
    clearError();
    startRequestInFlight = true;
    setStartButtonBusy(true, START_BUTTON_LOADING_LABEL);
    showTaskWorkbench();
    socket.emit("join_task", { task_id: taskId });

    try {
      const response = await fetch(_apiUrl('/start'), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          voice_id: _selectedVoiceId || "auto",
          subtitle_position: document.getElementById("subtitlePosition").value,
          interactive_review: document.getElementById("interactiveReviewToggle").value === "true",
        }),
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(payload.error || "启动失败");
      }
      if (payload.task) {
        currentTask = payload.task;
      }
      renderTaskHero();
      renderTaskState();
      restoreReviewState();
      scheduleRefreshTaskState(0);
    } catch (err) {
      showError(err.message || "启动失败");
      resetStartButton();
    } finally {
      startRequestInFlight = false;
      updateStartButtonState();
    }
  });

  socket.on("step_update", ({ step, status, message }) => {
    if (!taskId) return;
    if (currentTask) {
      currentTask.steps = currentTask.steps || {};
      currentTask.steps[step] = status;
      currentTask.step_messages = currentTask.step_messages || {};
      currentTask.step_messages[step] = message || "";
    }
    renderTaskState();
    scheduleRefreshTaskState();
  });
  socket.on("alignment_ready", payload => {
    if (payload.requires_confirmation) {
      if (currentTask) currentTask.current_review_step = "alignment";
      renderAlignmentReview(payload);
    } else {
      closePanel("alignmentReview");
    }
    scheduleRefreshTaskState(0);
  });
  socket.on("translate_result", payload => {
    if (payload.requires_confirmation) {
      if (currentTask) currentTask.current_review_step = "translate";
      renderTranslateReview(payload);
    } else {
      closePanel("translateReview");
    }
    scheduleRefreshTaskState(0);
  });
  socket.on("tts_script_ready", () => scheduleRefreshTaskState(0));
  socket.on("english_asr_result", () => scheduleRefreshTaskState(0));
  socket.on("subtitle_ready", () => scheduleRefreshTaskState(0));
  socket.on("capcut_ready", () => scheduleRefreshTaskState(0));
  socket.on("pipeline_done", () => scheduleRefreshTaskState(0));
  socket.on("pipeline_error", ({ error }) => { showError(error); alert("错误: " + error); scheduleRefreshTaskState(0); });

  async function refreshTaskState() {
    if (!taskId) return;
    const res = await fetch(_apiUrl());
    if (!res.ok) return;
    currentTask = await res.json();
    renderTaskHero();
    applyTaskConfigToForm();
    renderTaskState();
    restoreReviewState();
  }

  function scheduleRefreshTaskState(delay = 120) {
    if (!taskId) return;
    if (refreshTimer) clearTimeout(refreshTimer);
    refreshTimer = setTimeout(refreshTaskState, delay);
  }

  function taskNeedsLiveRefresh(task) {
    if (!task || !taskId) return false;
    if (task.status === "done" || task.status === "error") return false;
    return STEP_ORDER.some(step => {
      const status = task.steps?.[step];
      return status === "running" || status === "waiting";
    });
  }

  function startActiveRefreshLoop() {
    if (activeRefreshLoop || !taskId) return;
    activeRefreshLoop = setInterval(refreshTaskState, 5000);
  }

  function stopActiveRefreshLoop() {
    if (!activeRefreshLoop) return;
    clearInterval(activeRefreshLoop);
    activeRefreshLoop = null;
  }

  function syncActiveRefreshLoop(task) {
    if (taskNeedsLiveRefresh(task)) {
      startActiveRefreshLoop();
      return;
    }
    stopActiveRefreshLoop();
  }

  function renderTaskState() {
    if (!currentTask) return;
    renderStepMessages();
    renderStepPreviews(currentTask.artifacts || {});
    // 重渲染后恢复音频播放按钮状态
    if (_previewAudio && !_previewAudio.paused && _previewAudioGid) {
      _setAudioBtns(_previewAudioGid, true);
    }
    renderResultPanelFromTask();
    updateStartButtonState();
    updateResumeButtons(currentTask);
    syncActiveRefreshLoop(currentTask);
  }

  function renderStepMessages() {
    STEP_ORDER.forEach(step => {
      const stepEl = document.getElementById(`step-${step}`);
      const iconEl = document.getElementById(`icon-${step}`);
      const msgEl = document.getElementById(`msg-${step}`);
      let status = currentTask?.steps?.[step] || "pending";
      if (status === "running" && currentTask?.status === "error") status = "error";
      const message = currentTask?.step_messages?.[step] || placeholderText(status);
      stepEl.className = `step ${status}`;
      iconEl.className = `step-icon ${status}`;
      iconEl.innerHTML = status === "running" ? '<span class="spinner"></span>' : (stepIcons[status] || "·");
      msgEl.textContent = message;
    });
  }

  function renderStepPreviews(artifacts) {
    STEP_ORDER.forEach(step => {
      const previewEl = document.getElementById(`preview-${step}`);
      const artifact = artifacts[step];
      const status = currentTask?.steps?.[step] || "pending";
      if (!artifact) {
        previewEl.innerHTML = `<div class="preview-placeholder">${placeholderText(status)}</div>`;
        return;
      }
      if (artifact.layout === "variant_compare") {
        previewEl.innerHTML = renderVariantCompareArtifact(artifact);
        return;
      }
      if (!artifact.items || !artifact.items.length) {
        previewEl.innerHTML = `<div class="preview-placeholder">${placeholderText(status)}</div>`;
        return;
      }
      previewEl.innerHTML = artifact.items.map(item => renderPreviewItem(item)).join("");
    });
  }

  function renderVariantCompareArtifact(artifact) {
    const variants = artifact.variants || {};
    return `<div class="preview-compare" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;">${Object.entries(variants).map(([variantKey, variantPayload]) => `
      <div class="preview-block">
        <div class="preview-label">${escapeHtml(variantPayload.label || variantKey)}</div>
        <div style="display:flex;flex-direction:column;gap:10px;">${(variantPayload.items || []).map(item => renderPreviewItem(item, variantKey)).join("")}</div>
      </div>
    `).join("")}</div>`;
  }

  function renderPreviewItem(item, variantKey = null) {
    const label = `<div class="preview-label">${escapeHtml(item.label || "预览")}</div>`;
    if (item.type === "audio") {
      const src = item.url || artifactUrl(item.artifact, variantKey);
      // 用 artifact name + variantKey 生成稳定 gid，避免刷新后 gid 变化导致暂停失效
      const stableKey = (item.artifact || item.url || "") + (variantKey || "");
      const gid = "ag-" + stableKey.replace(/[^a-zA-Z0-9]/g, "").slice(0, 12);
      return `<div class="preview-block">${label}<div class="audio-btn-group" id="${gid}"><button class="audio-play-btn" onclick="playAudio('${gid}','${escapeJs(src)}')">&#9654; 播放</button><button class="audio-play-btn audio-pause-btn" onclick="pauseAudio('${gid}')">⏸ 暂停</button><span class="audio-time" id="${gid}-time"></span></div></div>`;
    }
    if (item.type === "video") return `<div class="preview-block">${label}<video class="media-player" controls playsinline preload="metadata" src="${item.url || artifactUrl(item.artifact, variantKey)}"></video></div>`;
    if (item.type === "download") return `<div class="preview-block">${label}<a class="download-btn" href="#" onclick="dlFile('${escapeJs(item.url)}','${escapeJs(item.label || "下载")}');return false;">${escapeHtml(item.label || "下载")}</a></div>`;
    if (item.type === "action") return `<div class="preview-block">${label}<button class="download-btn" onclick="triggerAction('${escapeJs(item.url)}','${escapeJs(item.method || "POST")}');return false;">${escapeHtml(item.label || "执行")}</button></div>`;
    if (item.type === "side_by_side") {
      const centerHtml = item.show_retranslate ? `<div class="preview-side-center"><button class="btn btn-primary btn-sm side-retranslate-btn" id="sideRetranslateBtn" onclick="doRetranslate(this)">重新翻译</button></div>` : '';
      return `<div class="preview-side-by-side${centerHtml ? '' : ' no-center'}""><div class="preview-side">${renderPreviewItem(item.left, variantKey)}</div>${centerHtml}<div class="preview-side">${renderPreviewItem(item.right, variantKey)}</div></div>`;
    }
    if (item.type === "text") return `<div class="preview-block">${label}<pre class="preview-text">${escapeHtml(item.content || "")}</pre></div>`;
    if (item.type === "scene_cuts") return `<div class="preview-block">${label}<div class="preview-text">${(item.values || []).length ? `镜头切换点：${item.values.map(fmtTime).join(" / ")}` : "没有检测到明显镜头切换点。"}</div></div>`;
    if (item.type === "utterances") return `<div class="preview-block">${label}<div class="preview-list">${(item.utterances || []).map(seg => `<div class="preview-block"><div class="preview-time">${fmtTime(seg.start_time)} → ${fmtTime(seg.end_time)}</div><div class="preview-original">${escapeHtml(seg.text || "")}</div></div>`).join("")}</div></div>`;
    if (item.type === "segments") return `<div class="preview-block">${label}<div class="preview-list">${(item.segments || []).map(seg => renderSegmentPreview(seg, item.break_after || [])).join("")}</div></div>`;
    if (item.type === "sentences") return `<div class="preview-block">${label}<div class="preview-list">${(item.sentences || []).map(renderSentencePreview).join("")}</div></div>`;
    if (item.type === "tts_blocks") return `<div class="preview-block">${label}<div class="preview-list">${(item.blocks || []).map(renderTtsBlockPreview).join("")}</div></div>`;
    if (item.type === "subtitle_chunks") return `<div class="preview-block">${label}<div class="preview-list">${(item.chunks || []).map(renderSubtitleChunkPreview).join("")}</div></div>`;
    return `<div class="preview-block">${label}<div class="preview-text">暂不支持的预览类型</div></div>`;
  }

  function renderSegmentPreview(seg, breakAfter) {
    const parts = [
      `<div class="preview-time">${fmtTime(seg.start_time)} → ${fmtTime(seg.end_time)}</div>`,
      `<div class="preview-original">${escapeHtml(seg.text || "")}</div>`,
    ];
    if (seg.translated) parts.push(`<div class="preview-translated">译文：${escapeHtml(seg.translated)}</div>`);
    if (seg.tts_duration !== undefined && seg.tts_duration !== null) parts.push(`<div class="preview-note">TTS 时长：${Number(seg.tts_duration).toFixed(2)}s</div>`);
    return `<div class="preview-block">${parts.join("")}</div>`;
  }

  function renderSentencePreview(sentence) {
    const notes = [];
    if ((sentence.source_segment_indices || []).length) notes.push(`源分段：${sentence.source_segment_indices.join(", ")}`);
    return `<div class="preview-block"><div class="preview-note">句子 ${Number(sentence.index ?? 0) + 1}</div><div class="preview-original">${escapeHtml(sentence.text || "")}</div>${renderPreviewNotes(notes)}</div>`;
  }

  function renderTtsBlockPreview(block) {
    const notes = [];
    if ((block.sentence_indices || []).length) notes.push(`句子索引：${block.sentence_indices.join(", ")}`);
    if ((block.source_segment_indices || []).length) notes.push(`源分段：${block.source_segment_indices.join(", ")}`);

  let _audioTimeInterval = null;

  function _fmtDuration(s) {
    const m = Math.floor(s / 60), sec = Math.floor(s % 60);
    return m + ":" + String(sec).padStart(2, "0");
  }

  function _updateAudioTime(gid) {
    const el = document.getElementById(gid + "-time");
    if (!el || !_previewAudio) return;
    const cur = _fmtDuration(_previewAudio.currentTime || 0);
    const dur = isFinite(_previewAudio.duration) ? _fmtDuration(_previewAudio.duration) : "--:--";
    el.textContent = cur + " / " + dur;
  }

  function playAudio(gid, src) {
    _resetOldAudio();
    if (_audioTimeInterval) { clearInterval(_audioTimeInterval); _audioTimeInterval = null; }
    _previewAudioGid = gid;
    _previewAudio = new Audio();
    _previewAudio.preload = "auto";
    _previewAudio.onloadedmetadata = () => _updateAudioTime(gid);
    _previewAudio.onplay = _previewAudio.onplaying = () => { _setAudioBtns(gid, true); };
    _previewAudio.onpause = () => { _setAudioBtns(gid, false); };
    _previewAudio.onended = () => { _setAudioBtns(gid, false); clearInterval(_audioTimeInterval); _updateAudioTime(gid); };
    _previewAudio.onerror = () => { clearInterval(_audioTimeInterval); };
    _previewAudio.oncanplaythrough = () => { _previewAudio.play().catch(() => {}); };
    _audioTimeInterval = setInterval(() => _updateAudioTime(gid), 500);
    _previewAudio.src = src;
    _previewAudio.load();
  }

  function pauseAudio(gid) {
    if (_previewAudio) {
      _previewAudio.pause();
      // 更新传入 gid 和实际 gid 的按钮状态

  function fmtTime(seconds) {
    if (seconds === undefined || seconds === null || Number.isNaN(Number(seconds))) return "--";
    const value = Number(seconds);
    return `${Math.floor(value / 60)}:${(value % 60).toFixed(1).padStart(4, "0")}`;

  function escapeHtml(value) {
    return String(value)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }

  function escapeTextarea(value) {
    return String(value)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;");
  }

  function escapeJs(value) {
    return String(value || "")
      .replaceAll("\\", "\\\\")
      .replaceAll("'", "\\'");
  }

  function initDraggable(panel) {
    const handle = panel.querySelector("[data-drag-handle]");
    if (!handle) return;
    let startX, startY, initLeft, initTop;

    handle.addEventListener("mousedown", e => {
      if (e.target.closest("button, input, select, textarea, a")) return;
      e.preventDefault();
      const rect = panel.getBoundingClientRect();
      if (!panel.classList.contains("dragged")) {
        panel.style.left = rect.left + "px";
        panel.style.top = rect.top + "px";
        panel.classList.add("dragged");
      }
      startX = e.clientX; startY = e.clientY;
      initLeft = rect.left; initTop = rect.top;

      function onMove(ev) {
        panel.style.left = Math.max(0, initLeft + ev.clientX - startX) + "px";
        panel.style.top = Math.max(0, initTop + ev.clientY - startY) + "px";
      }
      function onUp() {
        document.removeEventListener("mousemove", onMove);
        document.removeEventListener("mouseup", onUp);
      }
      document.addEventListener("mousemove", onMove);
      document.addEventListener("mouseup", onUp);
    });
  }

  function minimizePanel(panelId) {
    const panel = document.getElementById(panelId);
    panel.classList.add("hidden");
    const tray = document.getElementById("minimizedTray");
    if (document.getElementById("chip-" + panelId)) return;
    const chip = document.createElement("div");
    chip.className = "review-minimized-chip";
    chip.id = "chip-" + panelId;
    chip.textContent = _panelTitles[panelId] || "面板";
    chip.onclick = () => restorePanel(panelId);
    tray.appendChild(chip);
  }

  function restorePanel(panelId) {
    const panel = document.getElementById(panelId);
    panel.classList.remove("hidden");
    const chip = document.getElementById("chip-" + panelId);
    if (chip) chip.remove();
  }

  function removeMinimizedChip(panelId) {
    const chip = document.getElementById("chip-" + panelId);
    if (chip) chip.remove();
  }

  document.querySelectorAll(".review-panel").forEach(initDraggable);
</script>
