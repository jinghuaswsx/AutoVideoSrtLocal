<style>
  .sr-hidden {
    display: none !important;
  }

  .sr-page-shell {
    max-width: 1120px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .sr-hero-card {
    display: grid;
    grid-template-columns: minmax(0, 1.4fr) minmax(300px, 0.9fr);
    gap: 20px;
    padding: 28px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(180deg, rgba(247, 251, 255, 0.98) 0%, rgba(242, 248, 255, 0.98) 100%);
    border: 1px solid rgba(14, 86, 152, 0.12);
    border-radius: 20px;
    box-shadow: 0 12px 28px rgba(15, 58, 99, 0.08);
  }

  .sr-hero-card::after {
    content: "";
    position: absolute;
    inset: auto -80px -120px auto;
    width: 260px;
    height: 260px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(14, 165, 233, 0.18) 0%, rgba(14, 165, 233, 0) 70%);
    pointer-events: none;
  }

  .sr-page-title {
    margin: 14px 0 10px;
    color: #17324d;
    font-size: 30px;
    line-height: 1.2;
  }

  .sr-page-subtitle,
  .sr-upload-meta,
  .sr-flow-list {
    color: #5f7690;
    font-size: 14px;
    line-height: 1.6;
  }

  .sr-feature-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 20px;
  }

  .sr-feature-pill,
  .sr-eyebrow,
  .sr-panel-label {
    display: inline-flex;
    align-items: center;
    min-height: 22px;
    padding: 0 10px;
    border-radius: 999px;
    background: rgba(29, 111, 232, 0.1);
    color: #1d6fe8;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.04em;
  }

  .sr-feature-pill {
    min-height: 28px;
    padding: 0 12px;
  }

  .sr-hero-panel {
    position: relative;
    z-index: 1;
    padding: 20px;
    border-radius: 18px;
    background: linear-gradient(180deg, rgba(16, 58, 95, 0.96) 0%, rgba(21, 83, 133, 0.96) 100%);
    color: #eef7ff;
  }

  .sr-flow-list {
    margin: 14px 0 0;
    padding-left: 20px;
    color: rgba(238, 247, 255, 0.88);
  }

  .sr-flow-list li + li {
    margin-top: 8px;
  }

  .sr-shell {
    display: grid;
    gap: 16px;
    color: var(--text-main);
  }

  .sr-back-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 32px;
    width: fit-content;
    padding: 0 14px;
    border: 1px solid var(--border-main);
    border-radius: 999px;
    background: var(--bg-card);
    color: var(--text-main);
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
    transition: background-color 120ms ease, border-color 120ms ease, color 120ms ease;
  }

  .sr-back-link:hover,
  .sr-back-link:focus-visible {
    background: #f8fbff;
    border-color: rgba(29, 111, 232, 0.22);
    color: #1d6fe8;
    outline: none;
  }

  .sr-hero,
  .sr-card,
  .sr-upload-card {
    background: var(--bg-card);
    border: 1px solid var(--border-main);
    border-radius: 12px;
    box-shadow: 0 1px 2px rgba(17, 24, 39, 0.03);
  }

  .sr-hero {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    padding: 24px;
  }

  .sr-hero h1,
  .sr-card h2 {
    margin: 0;
    color: var(--text-main);
  }

  .sr-kicker,
  .sr-card-subtitle,
  .sr-hint {
    color: var(--text-main);
    opacity: 0.72;
  }

  .sr-kicker {
    margin-bottom: 8px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .sr-status-chip {
    align-self: flex-start;
    padding: 8px 12px;
    border-radius: 999px;
    background: #eef6ff;
    color: #1d4ed8;
    font-size: 13px;
    font-weight: 600;
    line-height: 1;
    white-space: nowrap;
  }

  .sr-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 16px;
  }

  .sr-grid-detail {
    align-items: start;
  }

  .sr-card {
    padding: 24px;
  }

  .sr-card-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 16px;
  }

  .sr-card-subtitle {
    margin-top: 6px;
    font-size: 13px;
  }

  .sr-card-meta {
    padding: 6px 10px;
    border-radius: 999px;
    background: #eff6ff;
    color: #1d4ed8;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
  }

  .sr-selection-stage {
    display: grid;
    gap: 12px;
  }

  .sr-selection-viewport {
    position: relative;
    max-width: 720px;
    aspect-ratio: 16 / 9;
    border: 1px solid var(--border-main);
    border-radius: 12px;
    background: linear-gradient(180deg, #f8fbff 0%, #eef6ff 100%);
    overflow: hidden;
  }

  .sr-selection-image {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    background: #f8fbff;
  }

  .sr-selection-overlay {
    position: absolute;
    inset: 0;
    cursor: crosshair;
  }

  .sr-selection-empty {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    padding: 24px;
    text-align: center;
  }
  .sr-selection-empty[hidden] {
    display: none !important;
  }

  .sr-selection-empty-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-main);
    margin-bottom: 8px;
  }

  .sr-selection-box {
    position: absolute;
    border: 2px solid var(--primary-color);
    border-radius: 10px;
    background: rgba(59, 130, 246, 0.12);
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.45);
    pointer-events: none;
  }

  .sr-selection-box::before,
  .sr-selection-box::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 8px;
    pointer-events: none;
  }

  .sr-selection-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .sr-selection-coords {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-main);
    opacity: 0.76;
  }

  .sr-mode-select {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }

  .sr-radio-tile {
    display: grid;
    gap: 6px;
    padding: 14px 16px;
    border: 1px solid var(--border-main);
    border-radius: 12px;
    background: #fff;
    cursor: pointer;
    transition: border-color 120ms ease, background-color 120ms ease, box-shadow 120ms ease;
  }

  .sr-radio-tile input {
    position: absolute;
    opacity: 0;
    pointer-events: none;
  }

  .sr-radio-tile.is-active {
    border-color: var(--primary-color);
    background: #eef6ff;
    box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.12);
  }

  .sr-radio-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-main);
  }

  .sr-radio-desc {
    font-size: 13px;
    color: var(--text-main);
    opacity: 0.72;
    line-height: 1.55;
  }

  .sr-action-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 16px;
  }

  .sr-status-panel,
  .sr-detail-summary {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
    margin-top: 16px;
  }

  .sr-detail-summary {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .sr-status-item,
  .sr-detail-summary > div {
    padding: 12px 14px;
    border-radius: 12px;
    background: #f8fbff;
    border: 1px solid var(--border-main);
  }

  .sr-status-label {
    display: block;
    margin-bottom: 6px;
    font-size: 12px;
    color: var(--text-main);
    opacity: 0.68;
  }

  .sr-status-item strong,
  .sr-detail-summary strong {
    display: block;
    font-size: 14px;
    color: var(--text-main);
    line-height: 1.5;
    word-break: break-word;
  }

  .sr-result-panel {
    display: grid;
    gap: 12px;
    margin-top: 16px;
  }

  .sr-compare-card {
    display: grid;
    gap: 16px;
  }

  .sr-compare-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 100px;
    align-items: flex-start;
    justify-content: flex-start;
  }

  .sr-compare-panel {
    display: grid;
    gap: 12px;
    width: 360px;
    max-width: 100%;
    min-width: 0;
  }

  .sr-compare-panel-head {
    display: grid;
    gap: 4px;
  }

  .sr-compare-panel-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-main);
  }

  .sr-compare-panel-hint {
    font-size: 13px;
    color: var(--text-main);
    opacity: 0.72;
    line-height: 1.55;
  }

  .sr-preview-frame,
  .sr-result-preview {
    width: min(360px, 100%);
    aspect-ratio: 9 / 16;
    max-height: 640px;
    overflow: hidden;
    border-radius: 16px;
    border: 1px solid var(--border-main);
    background: #06111f;
  }

  .sr-preview-video,
  .sr-preview-image,
  .sr-result-video {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: contain;
    background: #06111f;
  }

  .sr-result-copy {
    display: grid;
    gap: 12px;
  }

  .sr-result-empty {
    padding: 18px;
    border-radius: 14px;
    border: 1px solid var(--border-main);
    background: #f8fbff;
  }

  .sr-upload-card,
  .sr-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    padding: 24px;
  }

  .sr-upload-placeholder {
    justify-content: space-between;
  }

  .sr-upload-placeholder-title {
    font-weight: 600;
    color: var(--text-main);
  }

  .sr-upload-dropzone {
    width: 100%;
    border: 1.5px dashed rgba(29, 111, 232, 0.28);
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.88) 0%, rgba(243, 249, 255, 0.95) 100%),
      radial-gradient(circle at top, rgba(14, 165, 233, 0.12) 0%, rgba(14, 165, 233, 0) 56%);
    border-radius: 18px;
    padding: 40px 32px;
    text-align: center;
    transition: border-color 120ms ease, background-color 120ms ease, box-shadow 120ms ease;
    outline: none;
  }

  .sr-upload-dropzone:hover,
  .sr-upload-dropzone:focus-visible,
  .sr-upload-dropzone.is-dragover {
    border-color: rgba(29, 111, 232, 0.48);
    box-shadow: 0 12px 24px rgba(17, 84, 144, 0.12);
  }

  .sr-upload-dropzone input[type="file"] {
    display: none;
  }

  .sr-upload-icon {
    width: 72px;
    height: 72px;
    margin: 0 auto 18px;
    border-radius: 22px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, rgba(29, 111, 232, 0.14) 0%, rgba(14, 165, 233, 0.2) 100%);
    color: #1d6fe8;
  }

  .sr-upload-icon svg {
    width: 32px;
    height: 32px;
  }

  .sr-upload-title {
    margin: 0 0 8px;
    color: #17324d;
    font-size: 22px;
  }

  .sr-upload-actions {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    flex-wrap: wrap;
    margin-top: 22px;
  }

  .sr-btn-primary {
    min-height: 36px;
    padding: 0 18px;
    border-radius: 8px;
    background: linear-gradient(180deg, #1d6fe8 0%, #175bc6 100%);
    color: #f7fbff;
    box-shadow: 0 8px 18px rgba(29, 111, 232, 0.2);
  }

  .sr-progress {
    width: 100%;
    max-width: 520px;
    margin: 22px auto 0;
    text-align: left;
  }

  .sr-progress-bar {
    width: 100%;
    height: 10px;
    border-radius: 999px;
    background: rgba(17, 84, 144, 0.1);
    overflow: hidden;
  }

  .sr-progress-bar__fill {
    width: 0;
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, #1d6fe8 0%, #0ea5e9 100%);
    transition: width 120ms linear;
  }

  .sr-progress-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-top: 10px;
    color: #31506d;
    font-size: 13px;
    font-weight: 600;
  }

  .sr-inline-error {
    margin-top: 16px;
    padding: 12px 14px;
    border-radius: 12px;
    background: rgba(220, 82, 60, 0.08);
    border: 1px solid rgba(220, 82, 60, 0.18);
    color: #a94231;
    font-size: 14px;
    line-height: 1.6;
  }

  .sr-mode-readonly {
    pointer-events: none;
  }

  .sr-actions .btn[disabled],
  .sr-upload-card .btn[disabled] {
    cursor: not-allowed;
    opacity: 0.6;
    box-shadow: none;
  }

  @media (max-width: 1024px) {
    .sr-grid {
      grid-template-columns: 1fr;
    }

    .sr-compare-grid {
      grid-template-columns: 1fr;
      justify-content: flex-start;
    }

    .sr-status-panel,
    .sr-detail-summary {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 768px) {
    .sr-hero-card {
      grid-template-columns: 1fr;
    }

    .sr-page-title {
      font-size: 24px;
    }

    .sr-hero {
      flex-direction: column;
    }

    .sr-mode-select {
      grid-template-columns: 1fr;
    }

    .sr-selection-viewport {
      max-width: 100%;
    }

    .sr-upload-dropzone {
      padding: 30px 20px;
    }
  }

  .sr-erase-type-group {
    margin-bottom: 16px;
  }
  .sr-erase-type-label {
    font-size: 13px;
    color: #6b7280;
    margin-bottom: 8px;
  }
  .sr-erase-type-options {
    display: inline-flex;
    background: #f3f4f6;
    border-radius: 9999px;
    padding: 4px;
    gap: 2px;
    max-width: 100%;
  }
  .sr-erase-type-option {
    position: relative;
    padding: 6px 18px;
    border-radius: 9999px;
    cursor: pointer;
    background: transparent;
    color: #6b7280;
    font-size: 13px;
    font-weight: 500;
    text-align: center;
    white-space: nowrap;
    user-select: none;
    transition: color 120ms ease, background-color 120ms ease;
  }
  .sr-erase-type-option input[type="radio"] {
    position: absolute;
    opacity: 0;
    pointer-events: none;
    inset: 0;
  }
  .sr-erase-type-option.is-active,
  .sr-erase-type-option:has(input[type="radio"]:checked) {
    background: var(--primary-color);
    color: #fff;
  }
  .sr-erase-type-option.is-disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }
  .sr-erase-type-title {
    color: inherit;
    line-height: 1.3;
  }
  .sr-erase-type-hint {
    display: none;
  }
  @media (max-width: 640px) {
    .sr-erase-type-options {
      display: flex;
      width: 100%;
    }
    .sr-erase-type-option {
      flex: 1;
    }
  }
</style>
