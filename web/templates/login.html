<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 — AutoVideoSrt</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #7c6fe0 0%, #9b6fd4 40%, #b06ec8 70%, #c47ec4 100%);
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px 36px;
      width: 380px;
      box-shadow: 0 20px 60px rgba(100, 70, 200, 0.25), 0 4px 16px rgba(0,0,0,0.08);
    }
    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, #7c6fe0, #b06ec8);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 12px;
    }
    .logo h1 {
      font-size: 20px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 4px;
    }
    .logo p {
      font-size: 13px;
      color: #9ca3af;
    }
    .form-group {
      margin-bottom: 16px;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      background: #f9fafb;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      color: #111827;
      padding: 11px 14px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color .15s;
      outline: none;
    }
    input::placeholder { color: #9ca3af; }
    input:focus { border-color: #7c6fe0; background: #fff; }
    .btn {
      width: 100%;
      margin-top: 8px;
      background: linear-gradient(135deg, #7c6fe0, #9b6fd4);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.5px;
      transition: opacity .15s;
    }
    .btn:hover { opacity: 0.9; }
    .error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #ef4444;
      font-size: 13px;
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🎬</div>
      <h1>AutoVideoSrt</h1>
      <p>AI 视频字幕处理平台</p>
    </div>
    {% with messages = get_flashed_messages() %}
      {% if messages %}<div class="error">{{ messages[0] }}</div>{% endif %}
    {% endwith %}
    <form method="post">
      <div class="form-group">
        <input type="text" name="username" placeholder="用户名" autofocus required>
      </div>
      <div class="form-group">
        <input type="password" name="password" placeholder="密码" required>
      </div>
      <button class="btn" type="submit">登 录</button>
    </form>
  </div>
</body>
</html>
