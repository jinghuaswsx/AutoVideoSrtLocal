<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 — AutoVideoSrt</title>
  <script>
    (function() {
      var saved = localStorage.getItem('theme');
      if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <style>
    :root {
      --bg-body-grad: linear-gradient(135deg, #1e3a8a 0%, #1e40af 40%, #2563eb 70%, #3b82f6 100%);
      --bg-card: #fff;
      --card-shadow: 0 20px 60px rgba(37, 99, 235, 0.25), 0 4px 16px rgba(0,0,0,0.08);
      --text-main: #111827;
      --text-muted: #9ca3af;
      --primary-color: #3b82f6;
      --primary-gradient: linear-gradient(135deg, #2563eb, #0ea5e9);
      --primary-gradient-alt: linear-gradient(135deg, #1d4ed8, #0ea5e9);
      --bg-input: #f9fafb;
      --border-input: #e5e7eb;
      --bg-error: #fef2f2;
      --border-error: #fecaca;
      --text-error: #ef4444;
    }

    [data-theme='dark'] {
      --bg-body-grad: linear-gradient(135deg, #0a0f1c 0%, #0f172a 50%, #1e293b 100%);
      --bg-card: #0f172a;
      --card-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 40px rgba(14, 165, 233, 0.15);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --primary-color: #0ea5e9;
      --primary-gradient: linear-gradient(135deg, #0284c7, #22d3ee);
      --primary-gradient-alt: linear-gradient(135deg, #0369a1, #0ea5e9);
      --bg-input: #0a0f1c;
      --border-input: #1e293b;
      --bg-error: rgba(239, 68, 68, 0.15);
      --border-error: rgba(239, 68, 68, 0.3);
      --text-error: #fca5a5;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-body-grad);
      transition: background 0.3s ease;
    }
    .card {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 40px 36px 36px;
      width: 380px;
      box-shadow: var(--card-shadow);
      border: 1px solid rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }
    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 52px;
      height: 52px;
      background: var(--primary-gradient-alt);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .logo h1 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 4px;
    }
    .logo p {
      font-size: 13px;
      color: var(--text-muted);
    }
    .form-group {
      margin-bottom: 16px;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      background: var(--bg-input);
      border: 1.5px solid var(--border-input);
      border-radius: 10px;
      color: var(--text-main);
      padding: 11px 14px;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.2s;
      outline: none;
    }
    input::placeholder { color: var(--text-muted); }
    input:focus { border-color: var(--primary-color); background: var(--bg-card); box-shadow: 0 0 10px rgba(59, 130, 246, 0.2); }
    .btn {
      width: 100%;
      margin-top: 8px;
      background: var(--primary-gradient);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.5px;
      transition: all 0.2s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .btn:hover { opacity: 0.9; box-shadow: 0 0 20px var(--primary-color); }
    .error {
      background: var(--bg-error);
      border: 1px solid var(--border-error);
      color: var(--text-error);
      font-size: 13px;
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🎬</div>
      <h1>AutoVideoSrt</h1>
      <p>AI 视频字幕处理平台</p>
    </div>
    {% with messages = get_flashed_messages() %}
      {% if messages %}<div class="error">{{ messages[0] }}</div>{% endif %}
    {% endwith %}
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <input type="text" name="username" placeholder="用户名" autofocus required>
      </div>
      <div class="form-group">
        <input type="password" name="password" placeholder="密码" required>
      </div>
      <button class="btn" type="submit">登 录</button>
    </form>
  </div>
</body>
</html>
