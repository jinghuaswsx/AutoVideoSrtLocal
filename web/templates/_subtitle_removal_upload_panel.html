<section class="sr-upload-card">
  <div class="sr-backend-group" role="radiogroup" aria-label="字幕移除后端">
    <div class="sr-erase-type-label">处理方式</div>
    <div class="sr-backend-tabs">
      <label class="sr-backend-tab is-active" data-role="subtitle-backend-tab">
        <input type="radio" name="subtitle_backend" value="volc" checked>
        <span class="sr-backend-title">火山</span>
        <span class="sr-backend-hint">沿用原字幕移除版本</span>
      </label>
      <label class="sr-backend-tab" data-role="subtitle-backend-tab">
        <input type="radio" name="subtitle_backend" value="local_vsr">
        <span class="sr-backend-title">本地 VSR</span>
        <span class="sr-backend-hint">走本机 SubtitleRemover 服务</span>
      </label>
    </div>
  </div>

  <div class="sr-erase-type-group" role="radiogroup" aria-label="擦除类型">
    <div class="sr-erase-type-label">擦除类型</div>
    <div class="sr-erase-type-options">
      <label class="sr-erase-type-option" data-role="erase-type-option">
        <input type="radio" name="erase_text_type" value="subtitle" checked>
        <div class="sr-erase-type-title">仅字幕</div>
        <div class="sr-erase-type-hint">只擦除识别为字幕的区域</div>
      </label>
      <label class="sr-erase-type-option" data-role="erase-type-option">
        <input type="radio" name="erase_text_type" value="text">
        <div class="sr-erase-type-title">所有渲染文本</div>
        <div class="sr-erase-type-hint">字幕 + 水印、标题等都会被擦除</div>
      </label>
    </div>
  </div>

  <div
    class="sr-upload-dropzone"
    id="srUploadDropzone"
    role="button"
    tabindex="0"
    aria-controls="srUploadInput"
    aria-describedby="srUploadHint"
  >
    <input type="file" id="srUploadInput" accept="video/*">
    <div class="sr-upload-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <path d="M7 9l5-5 5 5"></path>
        <path d="M12 4v12"></path>
      </svg>
    </div>
    <h2 class="sr-upload-title">上传待处理视频</h2>
    <p class="sr-upload-hint" id="srUploadHint">支持常见视频格式。上传成功后会自动跳转到详情页，不再停留在占位状态。</p>
    <div class="sr-upload-actions">
      <button type="button" class="btn sr-btn-primary" id="srPickVideoButton">选择视频并上传</button>
      <div class="sr-upload-meta" id="srUploadMeta">建议先用 1 个短视频验证流程。</div>
    </div>
    <div class="sr-progress sr-hidden" id="srUploadProgressPanel" aria-live="polite">
      <div class="sr-progress-bar">
        <div class="sr-progress-bar__fill" id="srUploadProgress"></div>
      </div>
      <div class="sr-progress-row">
        <span id="srUploadProgressLabel">等待上传…</span>
        <span id="srUploadPercent">0%</span>
      </div>
    </div>
  </div>
  <div class="sr-inline-error sr-hidden" id="srUploadError"></div>
</section>
